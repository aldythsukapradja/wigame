<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><meta name="theme-color" content="#5f8cff"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="CodeKids">
  <title>Code Philosophy - Kinetik</title>
  <script type="application/kinetik-app+json">
{
  "appId": "code-philosophy-kids",
  "name": "Code Philosophy",
  "shortName": "CodeKids",
  "icon": "🧩",
  "gradient": [
    "#5f8cff",
    "#23d1a1"
  ],
  "category": "kids",
  "tagline": "Think like a coder first.",
  "about": "A kid-friendly computational thinking app that teaches sequence, loops, conditions, debugging, and data without starting with syntax.",
  "audience": "all",
  "circleTypes": [
    "family",
    "friends"
  ],
  "worksWith": [
    "offline",
    "standalone"
  ],
  "status": "live",
  "minMembers": 1
}
  </script>
  <style>
    :root{
      color-scheme:light;
      --bg:#eef5ff;
      --ink:#1f2633;
      --muted:rgba(31,38,51,.62);
      --panel:rgba(255,255,255,.80);
      --soft:rgba(255,255,255,.60);
      --line:rgba(31,38,51,.13);
      --accent:#5f8cff;
      --accent2:#23d1a1;
      --good:#22b98f;
      --danger:#e85f7a;
      --shadow:0 22px 60px rgba(42,66,96,.16);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    [data-theme="dark"]{
      color-scheme:dark;
      --bg:#0d111b;
      --ink:#f7f9ff;
      --muted:rgba(247,249,255,.66);
      --panel:rgba(22,28,42,.82);
      --soft:rgba(255,255,255,.08);
      --line:rgba(255,255,255,.13);
      --shadow:0 24px 70px rgba(0,0,0,.38);
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      min-height:100dvh;
      color:var(--ink);
      background:
        radial-gradient(circle at 14% 8%,color-mix(in srgb,var(--accent) 24%,transparent),transparent 34%),
        radial-gradient(circle at 88% 10%,color-mix(in srgb,var(--accent2) 20%,transparent),transparent 31%),
        linear-gradient(180deg,rgba(255,255,255,.25),transparent 50%),
        var(--bg);
      overflow:hidden;
    }
    button,input,select{font:inherit}
    button{cursor:pointer}
    .app{
      width:min(100%,680px);
      height:100dvh;
      margin:0 auto;
      padding:calc(12px + env(safe-area-inset-top)) 12px calc(12px + env(safe-area-inset-bottom));
      display:grid;
      grid-template-rows:auto minmax(0,1fr);
      gap:10px;
      overflow:hidden;
    }
    .top{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .brand{display:flex;align-items:center;gap:9px;min-width:0}
    .mark{width:38px;height:38px;border-radius:15px;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 12px 30px color-mix(in srgb,var(--accent) 24%,transparent);display:grid;place-items:center;color:white;font-size:22px;font-weight:950}
    h1,h2,h3,p{margin:0}
    h1{font-size:21px;line-height:1;font-weight:950;letter-spacing:0}
    h2{font-size:18px;line-height:1.1}
    h3{font-size:14px;line-height:1.1}
    .small{font-size:12px;color:var(--muted);line-height:1.25}
    .screen{display:none;min-height:0;overflow:hidden}
    .screen.active{display:grid}
    .center{align-content:center;gap:12px}
    .main{grid-template-rows:auto auto minmax(0,1fr);gap:10px;align-content:start}
    .panel{border:1px solid var(--line);background:var(--panel);backdrop-filter:blur(24px) saturate(1.16);box-shadow:var(--shadow);border-radius:24px;padding:14px;overflow:hidden}
    .flat{box-shadow:none;background:var(--soft)}
    .grid{display:grid;gap:9px}
    .two{grid-template-columns:1fr 1fr}
    .row{display:flex;align-items:center;gap:8px}
    .between{display:flex;align-items:center;justify-content:space-between;gap:10px}
    label{display:grid;gap:6px;font-size:12px;font-weight:850;color:var(--muted)}
    input,select{width:100%;min-height:44px;border:1px solid var(--line);background:var(--soft);color:var(--ink);border-radius:15px;padding:11px 12px;outline:none}
    input:focus,select:focus{border-color:color-mix(in srgb,var(--accent) 55%,transparent);box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 14%,transparent)}
    .btn{min-height:44px;border:0;border-radius:15px;padding:10px 13px;color:white;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 12px 28px color-mix(in srgb,var(--accent) 22%,transparent);font-weight:950;display:inline-flex;align-items:center;justify-content:center;gap:7px;touch-action:manipulation}
    .btn.secondary{background:var(--soft);border:1px solid var(--line);color:var(--ink);box-shadow:none}
    .btn.danger{background:rgba(232,95,122,.12);border:1px solid rgba(232,95,122,.28);color:var(--danger);box-shadow:none}
    .icon-btn{width:44px;height:44px;border-radius:15px;padding:0;flex:0 0 auto}
    .chip{border:1px solid var(--line);background:var(--soft);border-radius:999px;padding:7px 10px;color:var(--muted);font-size:12px;font-weight:850}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
    .stat{border:1px solid var(--line);background:var(--soft);border-radius:16px;padding:9px;text-align:center;min-width:0}
    .stat b{display:block;font-size:18px;line-height:1}
    .stat span{display:block;margin-top:3px;font-size:11px;color:var(--muted);font-weight:850}
    .scroll{min-height:0;overflow:auto;display:grid;gap:9px;overscroll-behavior:contain}
    .drawer{position:fixed;inset:auto 10px calc(10px + env(safe-area-inset-bottom)) 10px;max-width:660px;margin:0 auto;transform:translateY(120%);transition:transform .22s ease;z-index:10}
    .drawer.open{transform:translateY(0)}
    .drawer-list{max-height:48dvh;overflow:auto;display:grid;gap:7px;margin-top:10px}
    .toast{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translate(-50%,120px);background:#1d2635;color:white;border-radius:999px;padding:10px 14px;box-shadow:0 12px 34px rgba(0,0,0,.24);font-size:13px;font-weight:850;transition:transform .22s ease;z-index:20}
    .toast.show{transform:translate(-50%,0)}
    @media(max-height:720px){.app{gap:7px;padding-top:calc(8px + env(safe-area-inset-top));padding-bottom:calc(8px + env(safe-area-inset-bottom))}.panel{padding:11px}}

    .concept{font-size:28px;line-height:1.02;font-weight:950}
    .challenge-card{display:grid;grid-template-columns:104px 1fr;align-items:center;gap:13px}
    .visual{width:104px;height:104px;border-radius:24px;border:1px solid var(--line);background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 16%,var(--soft)),var(--soft));display:grid;place-items:center;overflow:hidden}
    .visual svg{width:92px;height:92px;display:block}
    @media(max-width:430px){.challenge-card{grid-template-columns:1fr}.visual{width:100%;height:108px}.concept{font-size:25px}}
    .choice{width:100%;text-align:left;justify-content:flex-start;background:var(--soft);border:1px solid var(--line);color:var(--ink);box-shadow:none}
    .choice.good{background:rgba(34,185,143,.15);border-color:rgba(34,185,143,.32)}
  </style>
</head>
<body>
  <main class="app">
    <header class="top"><div class="brand"><div class="mark">🧩</div><div><h1>Code Philosophy</h1><p class="small" id="circleLabel">Standalone circle</p></div></div><button class="btn secondary icon-btn" id="themeBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3v2.2M12 18.8V21M4.4 4.4 6 6M18 18l1.6 1.6M3 12h2.2M18.8 12H21M4.4 19.6 6 18M18 6l1.6-1.6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="2"/></svg></button></header>
    <section class="screen main active"><div class="stats"><div class="stat"><b id="scoreText">0</b><span>score</span></div><div class="stat"><b id="stepText">1</b><span>step</span></div><div class="stat"><b id="streakText">0</b><span>streak</span></div></div><div class="panel challenge-card"><div class="visual" id="visualBox"></div><div class="grid"><span class="chip" id="topicText">Topic</span><h2 class="concept" id="titleText">Title</h2><p id="cueText"></p></div></div><div class="panel grid" id="choices"></div></section>
  </main><div class="toast" id="toast">Saved</div>
  <script>
    const AppConfig={"appId":"code-philosophy-kids","storagePrefix":"kinetik_code_philosophy_kids","sessionCollection":"challenge_sessions"};
    const cards=[{"topic":"Sequence","title":"Make A Sandwich","cue":"A computer follows steps in order. Which step comes first?","choices":["Eat the sandwich","Put bread on the plate","Clean the plate after eating"],"answer":1,"explain":"Start with the first physical step."},{"topic":"Loop","title":"Brush Every Tooth","cue":"A loop repeats the same action until done.","choices":["Brush one tooth and stop","Brush each tooth one by one","Throw away the toothbrush"],"answer":1,"explain":"Loops repeat useful steps."},{"topic":"Condition","title":"If It Rains","cue":"A condition chooses what to do.","choices":["If raining, take umbrella","Always take sunglasses only","Never check weather"],"answer":0,"explain":"If this happens, do that."},{"topic":"Debugging","title":"The Robot Is Stuck","cue":"Debugging means finding the wrong step.","choices":["Get angry at the robot","Check the instructions","Delete every step"],"answer":1,"explain":"Debugging starts by checking the steps."},{"topic":"Pattern","title":"Red Blue Red Blue","cue":"Patterns help predict what comes next.","choices":["Red","Blue","Pizza"],"answer":0,"explain":"The pattern repeats red, blue."},{"topic":"Function","title":"Magic Helper Box","cue":"A function is a reusable helper.","choices":["A helper you can call again","A random mistake","A broken keyboard"],"answer":0,"explain":"Functions help reuse logic."}];
    const $=(id)=>document.getElementById(id);const state={circleId:"standalone_demo",circleType:"family",theme:localStorage.getItem(AppConfig.storagePrefix+"_theme")||"light",index:Number(localStorage.getItem(AppConfig.storagePrefix+"_index")||0),score:Number(localStorage.getItem(AppConfig.storagePrefix+"_score")||0),streak:0};
    document.documentElement.dataset.theme=state.theme;if(window.self!==window.top)document.body.classList.add("embedded");const Bridge={send(type,payload){if(window.parent&&window.parent!==window)window.parent.postMessage({type,appId:AppConfig.appId,payload},"*")}};
    addEventListener("message",(event)=>{const msg=event.data||{};if(msg.type!=="INIT_APP")return;const ctx=msg.payload||{};state.circleId=ctx.circleId||state.circleId;state.circleType=ctx.circleType||state.circleType;if(ctx.theme)setTheme(ctx.theme);$("circleLabel").textContent=state.circleType+" circle"});
    function setTheme(theme){state.theme=theme==="dark"?"dark":"light";document.documentElement.dataset.theme=state.theme;localStorage.setItem(AppConfig.storagePrefix+"_theme",state.theme)}
    function toast(message){$("toast").textContent=message;$("toast").classList.add("show");Bridge.send("SHOW_TOAST",{message});clearTimeout(toast.timer);toast.timer=setTimeout(()=>$("toast").classList.remove("show"),1300)}
    function render(){const card=cards[state.index%cards.length];$("scoreText").textContent=state.score;$("stepText").textContent=(state.index%cards.length)+1;$("streakText").textContent=state.streak;$("topicText").textContent=card.topic;$("titleText").textContent=card.title;$("cueText").textContent=card.cue;$("visualBox").innerHTML=visualSvg(card.topic);$("choices").innerHTML=card.choices.map((choice,i)=>'<button class="btn choice" data-choice="'+i+'">'+escapeHtml(choice)+'</button>').join("");document.querySelectorAll("[data-choice]").forEach((b)=>b.onclick=()=>choose(Number(b.dataset.choice)))}
    function visualSvg(topic){const color=getComputedStyle(document.documentElement).getPropertyValue("--accent").trim()||"#5f8cff";const color2=getComputedStyle(document.documentElement).getPropertyValue("--accent2").trim()||"#23d1a1";if(topic==="Loop")return '<svg viewBox="0 0 120 120" aria-hidden="true"><path d="M36 38h42a22 22 0 1 1-8 42" fill="none" stroke="'+color+'" stroke-width="10" stroke-linecap="round"/><path d="M70 80l-2-18 18 7z" fill="'+color2+'"/><circle cx="34" cy="38" r="12" fill="'+color2+'"/></svg>';if(topic==="Condition")return '<svg viewBox="0 0 120 120" aria-hidden="true"><path d="M60 18l34 34-34 34-34-34z" fill="none" stroke="'+color+'" stroke-width="8"/><path d="M28 96h64" stroke="'+color2+'" stroke-width="9" stroke-linecap="round"/><text x="60" y="57" text-anchor="middle" font-size="22" font-weight="900" fill="currentColor">IF</text></svg>';if(topic==="Debugging")return '<svg viewBox="0 0 120 120" aria-hidden="true"><rect x="24" y="26" width="72" height="58" rx="16" fill="none" stroke="'+color+'" stroke-width="8"/><path d="M42 48h36M42 64h20" stroke="'+color2+'" stroke-width="7" stroke-linecap="round"/><path d="M78 76l18 18M96 76L78 94" stroke="#e85f7a" stroke-width="8" stroke-linecap="round"/></svg>';if(topic==="Pattern")return '<svg viewBox="0 0 120 120" aria-hidden="true"><circle cx="28" cy="60" r="16" fill="'+color+'"/><rect x="50" y="44" width="32" height="32" rx="10" fill="'+color2+'"/><circle cx="100" cy="60" r="16" fill="'+color+'"/></svg>';if(topic==="Function")return '<svg viewBox="0 0 120 120" aria-hidden="true"><rect x="18" y="36" width="84" height="48" rx="18" fill="none" stroke="'+color+'" stroke-width="8"/><path d="M14 60h24M82 60h24" stroke="'+color2+'" stroke-width="9" stroke-linecap="round"/><text x="60" y="67" text-anchor="middle" font-size="24" font-weight="900" fill="currentColor">ƒ</text></svg>';return '<svg viewBox="0 0 120 120" aria-hidden="true"><rect x="16" y="24" width="28" height="28" rx="10" fill="'+color+'"/><path d="M48 38h24" stroke="'+color2+'" stroke-width="8" stroke-linecap="round"/><rect x="76" y="24" width="28" height="28" rx="10" fill="'+color+'"/><path d="M60 56v20" stroke="'+color2+'" stroke-width="8" stroke-linecap="round"/><rect x="46" y="78" width="28" height="28" rx="10" fill="'+color+'"/></svg>'}
    function choose(i){const card=cards[state.index%cards.length];if(i===card.answer){state.score+=10+state.streak;state.streak++;toast("Nice")}else{state.streak=0;toast(card.explain)}state.index++;localStorage.setItem(AppConfig.storagePrefix+"_index",String(state.index));localStorage.setItem(AppConfig.storagePrefix+"_score",String(state.score));Bridge.send("DATA_CREATE",{collection:AppConfig.sessionCollection,payload:{circleId:state.circleId,appId:AppConfig.appId,topic:card.topic,correct:i===card.answer,createdAt:new Date().toISOString()}});render()}
    function escapeHtml(text){return String(text).replace(/[&<>"']/g,(m)=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
    $("themeBtn").onclick=()=>setTheme(state.theme==="dark"?"light":"dark");render();
  </script>
</body>
</html>
