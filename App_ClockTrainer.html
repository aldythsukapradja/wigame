<!--
KINETIK APP STANDARD v0.1

Standalone app file: App_ClockTrainer.html

This app works embedded in Kinetik.html and standalone as a PWA. It uses circleId, circleType, personId and stores clock-learning sessions in AppRecords.

REACT/TYPESCRIPT APP SCALE-UP NOTE:
- This single-file app should later become a React feature module or standalone route.
- It must keep using AppBridge/DataAPI contracts.
- It must not access another circle's data.
- It must store app-specific data in AppRecords using circleId, appId, collection, payloadJson.
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><meta name="theme-color" content="#6bdcff"><link rel="manifest" href="./manifest_clock.webmanifest"><title>Clock Trainer - Kinetik</title>
  <style>
    :root{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--bg:#07111f;--text:#f5fbff;--muted:rgba(245,251,255,.68);--panel:rgba(255,255,255,.12);--line:rgba(255,255,255,.18);--accent:#6bdcff;--accent2:#8d7cff}*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--text);background:radial-gradient(circle at 20% 15%,rgba(107,220,255,.25),transparent 34%),radial-gradient(circle at 80% 10%,rgba(141,124,255,.2),transparent 34%),var(--bg);padding:18px}.app{max-width:760px;margin:auto}.top{display:flex;justify-content:space-between}.pill{border:1px solid var(--line);background:var(--panel);backdrop-filter:blur(22px);border-radius:999px;padding:8px 12px;color:var(--muted);font-size:12px}h1{font-size:34px;margin-bottom:6px}.card{border:1px solid var(--line);background:var(--panel);backdrop-filter:blur(24px);border-radius:28px;padding:18px;box-shadow:0 24px 70px rgba(0,0,0,.35);margin-top:14px}.clock{width:min(78vw,320px);height:min(78vw,320px);border:16px solid rgba(107,220,255,.65);border-radius:50%;margin:18px auto;position:relative;background:rgba(255,255,255,.08)}.hand{position:absolute;left:50%;top:50%;height:7px;border-radius:99px;background:#fff;transform-origin:left center}.hour{width:72px}.minute{width:106px;background:var(--accent)}.center{position:absolute;left:50%;top:50%;width:18px;height:18px;background:#fff;border-radius:50%;transform:translate(-50%,-50%)}.answers{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}button{font:inherit;border:1px solid var(--line);border-radius:18px;padding:14px;background:rgba(255,255,255,.12);color:var(--text);cursor:pointer}button:hover{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#06111f}.muted{color:var(--muted)}
  </style>
</head>
<body>
  <main class="app"><div class="top"><span class="pill" id="mode">Standalone demo</span><span class="pill" id="circle">Family learning</span></div><h1>Clock Trainer</h1><p class="muted">Practice reading analog time.</p>
    <section class="card"><h2 id="prompt">What time is this?</h2><div class="clock"><div class="hand hour" id="hour"></div><div class="hand minute" id="minute"></div><div class="center"></div></div><div class="answers" id="answers"></div></section>
    <section class="card"><b id="progress">0 correct</b><p class="muted">Progress is saved to AppRecords when embedded.</p></section>
  </main>
  <script>
    const state={appId:"clock-trainer",circleId:"demo_family",circleType:"family",hour:3,minute:15,correct:0};
    const $=id=>document.getElementById(id);const Bridge={send(type,payload){if(window.parent&&window.parent!==window)window.parent.postMessage({type,appId:state.appId,payload},"*")}};
    window.addEventListener("message",e=>{const msg=e.data||{};if(msg.type==="INIT_APP"){Object.assign(state,msg.payload||{});$("mode").textContent="Embedded in Kinetik";$("circle").textContent=state.circleId;newQuestion()}});
    function fmt(h,m){return `${h}:${String(m).padStart(2,"0")}`}
    function newQuestion(){state.hour=Math.floor(Math.random()*12)+1;state.minute=[0,15,30,45][Math.floor(Math.random()*4)];$("hour").style.transform=`rotate(${(state.hour%12)*30+state.minute*.5-90}deg)`;$("minute").style.transform=`rotate(${state.minute*6-90}deg)`;const correct=fmt(state.hour,state.minute);const opts=[correct,fmt((state.hour%12)+1,state.minute),fmt(state.hour,state.minute===45?15:state.minute+15),fmt(Math.max(1,state.hour-1),state.minute)].sort(()=>Math.random()-.5);$("answers").innerHTML=opts.map(o=>`<button data-v="${o}">${o}</button>`).join("");document.querySelectorAll("[data-v]").forEach(b=>b.onclick=()=>answer(b.dataset.v===correct))}
    function answer(ok){if(ok)state.correct++;$("progress").textContent=`${state.correct} correct`;Bridge.send("DATA_CREATE",{collection:"sessions",payload:{correct:ok,hour:state.hour,minute:state.minute,at:new Date().toISOString()}});newQuestion()}
    newQuestion();if("serviceWorker" in navigator) navigator.serviceWorker.register("./PWA_SW.js").catch(()=>{});
  </script>
</body>
</html>
