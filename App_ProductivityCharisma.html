<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ff6b8f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Charisma">
  <title>Charisma Coach - Kinetik</title>
  <script type="application/kinetik-app+json">
{
  "appId": "productivity-charisma",
  "name": "Charisma Coach",
  "shortName": "Charisma",
  "icon": "✨",
  "gradient": ["#ff6b8f", "#ffc857"],
  "category": "productivity",
  "tagline": "Warmth, presence, and better connection.",
  "about": "A tiny charisma practice app built around one social rep at a time: listen better, make people feel seen, tell tighter stories, and leave conversations warmer than you found them.",
  "audience": "people who want better social confidence without fake scripts",
  "circleTypes": ["friends", "work", "community"],
  "worksWith": ["offline", "standalone", "local progress"],
  "status": "live",
  "minMembers": 1
}
  </script>
  <style>
    :root{color-scheme:light;--bg:#fff4f7;--ink:#222431;--muted:rgba(34,36,49,.64);--panel:rgba(255,255,255,.82);--soft:rgba(255,255,255,.58);--line:rgba(34,36,49,.12);--accent:#ff6b8f;--accent2:#ffc857;--good:#19a974;--bad:#dc4f66;--shadow:0 22px 60px rgba(88,56,77,.16);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    [data-theme="dark"]{color-scheme:dark;--bg:#151019;--ink:#faf7ff;--muted:rgba(250,247,255,.66);--panel:rgba(32,25,39,.84);--soft:rgba(255,255,255,.08);--line:rgba(255,255,255,.13);--shadow:0 24px 70px rgba(0,0,0,.38)}
    *{box-sizing:border-box}html,body{height:100%;margin:0}body{min-height:100dvh;color:var(--ink);background:radial-gradient(circle at 14% 8%,color-mix(in srgb,var(--accent) 24%,transparent),transparent 34%),radial-gradient(circle at 88% 10%,color-mix(in srgb,var(--accent2) 20%,transparent),transparent 31%),var(--bg);overflow:hidden}button{font:inherit;cursor:pointer}h1,h2,h3,p{margin:0}.app{width:min(100%,680px);height:100dvh;margin:0 auto;padding:calc(12px + env(safe-area-inset-top)) 12px calc(12px + env(safe-area-inset-bottom));display:grid;grid-template-rows:auto minmax(0,1fr);gap:10px;overflow:hidden}.top{display:flex;align-items:center;justify-content:space-between;gap:8px}.brand{display:flex;align-items:center;gap:9px;min-width:0}.mark{width:38px;height:38px;border-radius:15px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;color:white;font-size:22px;font-weight:950;box-shadow:0 12px 30px color-mix(in srgb,var(--accent) 24%,transparent)}h1{font-size:21px;line-height:1;font-weight:950}.small{font-size:12px;color:var(--muted);line-height:1.25}.main{min-height:0;display:grid;grid-template-rows:auto auto minmax(0,1fr);gap:10px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.stat{border:1px solid var(--line);background:var(--soft);border-radius:16px;padding:9px;text-align:center}.stat b{display:block;font-size:18px;line-height:1}.stat span{display:block;margin-top:3px;font-size:11px;color:var(--muted);font-weight:850}.panel{border:1px solid var(--line);background:var(--panel);backdrop-filter:blur(24px) saturate(1.16);box-shadow:var(--shadow);border-radius:24px;padding:14px;overflow:hidden}.lesson{display:grid;grid-template-columns:112px 1fr;align-items:center;gap:13px}.visual{width:112px;height:112px;border-radius:24px;border:1px solid var(--line);background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 16%,var(--soft)),var(--soft));display:grid;place-items:center}.visual svg{width:98px;height:98px}.grid{display:grid;gap:9px}.chip{width:max-content;border:1px solid var(--line);background:var(--soft);border-radius:999px;padding:7px 10px;color:var(--muted);font-size:12px;font-weight:850}.title{font-size:27px;line-height:1.02;font-weight:950}.action{border-left:5px solid var(--accent);padding:9px 10px;background:var(--soft);border-radius:14px;color:var(--muted);font-size:13px;line-height:1.35}.choices{min-height:0;overflow:auto;display:grid;gap:8px;scrollbar-width:none}.choices::-webkit-scrollbar{display:none}.choice{width:100%;min-height:44px;border:1px solid var(--line);border-radius:15px;padding:10px 13px;text-align:left;background:var(--soft);color:var(--ink);font-weight:850}.choice.good{border-color:rgba(25,169,116,.35);background:rgba(25,169,116,.14)}.btn{width:44px;height:44px;border:1px solid var(--line);border-radius:15px;background:var(--soft);color:var(--ink)}.toast{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translate(-50%,120px);background:#1d2635;color:white;border-radius:999px;padding:10px 14px;box-shadow:0 12px 34px rgba(0,0,0,.24);font-size:13px;font-weight:850;transition:transform .22s ease;z-index:20}.toast.show{transform:translate(-50%,0)}@media(max-width:430px){.lesson{grid-template-columns:1fr}.visual{width:100%;height:112px}.title{font-size:25px}}
  </style>
</head>
<body>
  <main class="app">
    <header class="top"><div class="brand"><div class="mark">✨</div><div><h1>Charisma Coach</h1><p class="small" id="circleLabel">Standalone circle</p></div></div><button class="btn" id="themeBtn">☼</button></header>
    <section class="main"><div class="stats"><div class="stat"><b id="scoreText">0</b><span>score</span></div><div class="stat"><b id="stepText">1</b><span>rep</span></div><div class="stat"><b id="streakText">0</b><span>streak</span></div></div><div class="panel lesson"><div class="visual" id="visualBox"></div><div class="grid"><span class="chip" id="moduleText">Module</span><h2 class="title" id="titleText">Title</h2><p id="ideaText"></p><div class="action" id="actionText"></div></div></div><div class="panel grid"><p id="scenarioText"></p><div class="choices" id="choices"></div></div></section>
  </main>
  <div class="toast" id="toast">Saved</div>
  <script>
    const AppConfig={appId:"productivity-charisma",storagePrefix:"kinetik_productivity_charisma",sessionCollection:"productivity_sessions"};
    const lessons=[
      {module:"Presence",title:"The 3-Second Landing",idea:"Charisma starts when people feel you fully arrived.",action:"Before answering, pause, breathe, look at the person, then respond.",scenario:"A friend shares good news quickly. What is the best first move?",choices:["Match their energy and ask one curious question.","Tell a better story about yourself.","Check your phone while saying congrats."],answer:0,why:"Warm attention first. Your story can wait.",visual:"spark"},
      {module:"Warmth",title:"Name The Feeling",idea:"People feel seen when you reflect the emotion, not only the facts.",action:"Use one sentence: That sounds exciting, heavy, frustrating, or meaningful.",scenario:"Someone says their project finally launched after months. What lands best?",choices:["That must feel satisfying after all that work.","How much money did it make?","I also launched something once."],answer:0,why:"Reflect the emotion before moving to details.",visual:"heart"},
      {module:"Curiosity",title:"Follow The Glow",idea:"Ask about the topic where their face and voice wake up.",action:"Listen for energy, then ask a deeper follow-up.",scenario:"They mention cooking, work, and a weekend hike, but smile most at the hike. Ask:",choices:["What was the best moment on the hike?","So what do you do for work exactly?","Do you cook every day?"],answer:0,why:"Follow visible energy.",visual:"compass"},
      {module:"Story",title:"Tiny Story Spine",idea:"A memorable story needs context, tension, turn, and point.",action:"Practice: where we were, what went wrong, what changed, why it mattered.",scenario:"You have 30 seconds to tell a story. Start with:",choices:["Set the scene and the problem.","List every detail in order.","Apologize that the story is boring."],answer:0,why:"Context plus tension gives people a reason to listen.",visual:"book"},
      {module:"Exit",title:"Leave A Warm Trace",idea:"The final sentence often becomes the emotional memory.",action:"End with appreciation or a specific callback.",scenario:"A conversation is ending. Best close?",choices:["I loved hearing about your hiking story. Send me the photo later.","Okay bye.","Anyway I need to go."],answer:0,why:"Specific warmth is remembered.",visual:"spark"}
    ];
    const $=(id)=>document.getElementById(id);const state={theme:localStorage.getItem(AppConfig.storagePrefix+"_theme")||"light",index:Number(localStorage.getItem(AppConfig.storagePrefix+"_index")||0),score:Number(localStorage.getItem(AppConfig.storagePrefix+"_score")||0),streak:0,circleId:"standalone_demo",circleType:"friends"};document.documentElement.dataset.theme=state.theme;if(window.self!==window.top)document.body.classList.add("embedded");const Bridge={send(type,payload){if(window.parent&&window.parent!==window)window.parent.postMessage({type,appId:AppConfig.appId,payload},"*")}};addEventListener("message",(event)=>{const msg=event.data||{};if(msg.type!=="INIT_APP")return;const ctx=msg.payload||{};state.circleId=ctx.circleId||state.circleId;state.circleType=ctx.circleType||state.circleType;if(ctx.theme)setTheme(ctx.theme);$("circleLabel").textContent=state.circleType+" circle"});
    function setTheme(theme){state.theme=theme==="dark"?"dark":"light";document.documentElement.dataset.theme=state.theme;localStorage.setItem(AppConfig.storagePrefix+"_theme",state.theme)}function toast(message){$("toast").textContent=message;$("toast").classList.add("show");clearTimeout(toast.timer);toast.timer=setTimeout(()=>$("toast").classList.remove("show"),1200);Bridge.send("SHOW_TOAST",{message})}
    function render(){const card=lessons[state.index%lessons.length];$("scoreText").textContent=state.score;$("stepText").textContent=(state.index%lessons.length)+1;$("streakText").textContent=state.streak;$("moduleText").textContent=card.module;$("titleText").textContent=card.title;$("ideaText").textContent=card.idea;$("actionText").textContent=card.action;$("scenarioText").textContent=card.scenario;$("visualBox").innerHTML=visualSvg(card.visual);$("choices").innerHTML=card.choices.map((choice,i)=>`<button class="choice" data-choice="${i}">${escapeHtml(choice)}</button>`).join("");document.querySelectorAll("[data-choice]").forEach((button)=>button.onclick=()=>choose(Number(button.dataset.choice)))}
    function choose(i){const card=lessons[state.index%lessons.length];if(i===card.answer){state.score+=10+state.streak;state.streak++;toast("Good rep")}else{state.streak=0;toast(card.why)}state.index++;localStorage.setItem(AppConfig.storagePrefix+"_index",String(state.index));localStorage.setItem(AppConfig.storagePrefix+"_score",String(state.score));Bridge.send("DATA_CREATE",{collection:AppConfig.sessionCollection,payload:{appId:AppConfig.appId,circleId:state.circleId,module:card.module,correct:i===card.answer,createdAt:new Date().toISOString()}});render()}
    function visualSvg(type){const a=getComputedStyle(document.documentElement).getPropertyValue("--accent").trim();const b=getComputedStyle(document.documentElement).getPropertyValue("--accent2").trim();if(type==="heart")return `<svg viewBox="0 0 120 120" aria-hidden="true"><path d="M60 94S26 74 26 46c0-14 18-22 34-4 16-18 34-10 34 4 0 28-34 48-34 48z" fill="${a}"/><circle cx="82" cy="36" r="10" fill="${b}"/></svg>`;if(type==="compass")return `<svg viewBox="0 0 120 120" aria-hidden="true"><circle cx="60" cy="60" r="38" fill="none" stroke="${a}" stroke-width="8"/><path d="M72 36 62 68 44 78l10-32z" fill="${b}"/></svg>`;if(type==="book")return `<svg viewBox="0 0 120 120" aria-hidden="true"><path d="M26 30h30c10 0 14 6 14 16v44c0-10-6-14-16-14H26z" fill="${a}"/><path d="M70 46c0-10 4-16 14-16h10v46H76c-4 0-6 2-6 8z" fill="${b}"/></svg>`;return `<svg viewBox="0 0 120 120" aria-hidden="true"><path d="M60 18l10 28 30 10-30 10-10 36-10-36-30-10 30-10z" fill="${a}"/><circle cx="88" cy="32" r="11" fill="${b}"/></svg>`}
    function escapeHtml(text){return String(text).replace(/[&<>"']/g,(m)=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}$("themeBtn").onclick=()=>setTheme(state.theme==="dark"?"light":"dark");render();
  </script>
</body>
</html>
