<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#eef2fb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Cambridge">
  <title>Cambridge Primary - Kinetik</title>
  <script type="application/kinetik-app+json">
{
  "appId": "cambridge-primary",
  "name": "Cambridge Primary",
  "shortName": "Cambridge",
  "icon": "CP",
  "gradient": ["#34d399", "#4f46e5"],
  "category": "kids",
  "tagline": "Primary learning, stage by stage.",
  "about": "A local-first Cambridge Primary learning engine for English 0058, Mathematics 0096, Science 0097, and French via Modern Foreign Language 0064. It tracks objectives, mastery, mistakes, and editable parent-reviewed content.",
  "audience": "family",
  "circleTypes": ["family"],
  "worksWith": ["offline", "standalone", "learning", "future-backend"],
  "status": "live",
  "minMembers": 1
}
  </script>
  <style>
    :root{
      color-scheme:light;
      --bg0:#eef2fb;
      --bg1:#e7edf9;
      --ink:#0d1426;
      --muted:rgba(13,20,38,.68);
      --faint:rgba(13,20,38,.45);
      --panel:rgba(255,255,255,.72);
      --panel2:rgba(255,255,255,.88);
      --soft:rgba(20,40,90,.06);
      --line:rgba(112,132,184,.25);
      --accent:#22c8b8;
      --accent2:#5667f2;
      --good:#059669;
      --warn:#d97706;
      --bad:#e11d48;
      --shadow:0 24px 70px rgba(53,75,120,.18);
      --sat:env(safe-area-inset-top,0px);
      --sab:env(safe-area-inset-bottom,0px);
      --navh:calc(64px + max(var(--sab),8px));
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
    }
    html[data-theme="dark"]{
      color-scheme:dark;
      --bg0:#05070f;
      --bg1:#0a1022;
      --ink:#eef2ff;
      --muted:rgba(238,242,255,.66);
      --faint:rgba(238,242,255,.42);
      --panel:rgba(15,22,44,.64);
      --panel2:rgba(20,30,58,.78);
      --soft:rgba(255,255,255,.08);
      --line:rgba(255,255,255,.13);
      --shadow:0 24px 80px rgba(0,0,0,.44);
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;overflow:hidden}
    body{
      min-height:100dvh;
      color:var(--ink);
      background:
        radial-gradient(120% 90% at 82% -10%,color-mix(in srgb,var(--accent) 18%,transparent),transparent 56%),
        radial-gradient(120% 95% at 0% 100%,color-mix(in srgb,var(--accent2) 15%,transparent),transparent 58%),
        linear-gradient(170deg,var(--bg1),var(--bg0) 58%,var(--bg1));
      -webkit-font-smoothing:antialiased;
    }
    button,input,select,textarea{font:inherit;color:inherit}
    button{border:0;background:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
    h1,h2,h3,p{margin:0}
    h1{font-size:21px;line-height:1;font-weight:850}
    h2{font-size:22px;line-height:1.08}
    h3{font-size:15px;line-height:1.2}
    .app{height:100dvh;display:grid;grid-template-rows:auto minmax(0,1fr) auto;max-width:980px;margin:0 auto;padding-top:var(--sat);overflow:hidden}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 16px 9px}
    .brand{display:flex;align-items:center;gap:10px;min-width:0}
    .mark{width:42px;height:42px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;color:#fff;font-weight:950;box-shadow:0 12px 30px color-mix(in srgb,var(--accent2) 28%,transparent)}
    .brand p,.small{font-size:12px;color:var(--muted);line-height:1.35}
    .top-actions{display:flex;align-items:center;gap:8px}
    .glass{background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(24px) saturate(1.25);-webkit-backdrop-filter:blur(24px) saturate(1.25)}
    .card{border-radius:22px;padding:15px}
    .flat{background:var(--soft);box-shadow:none}
    .btn{min-height:44px;border-radius:999px;padding:10px 16px;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 10px 26px color-mix(in srgb,var(--accent) 28%,transparent);transition:transform .18s}
    .btn:active,.icon-btn:active,.lesson-card:active,.chip:active{transform:scale(.96)}
    .btn.secondary{background:var(--soft);color:var(--ink);box-shadow:none;border:1px solid var(--line)}
    .btn.danger{background:rgba(225,29,72,.12);color:var(--bad);box-shadow:none;border:1px solid rgba(225,29,72,.25)}
    .icon-btn{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:var(--soft);border:1px solid var(--line);transition:transform .18s;flex:0 0 auto}
    .icon-btn svg,.nav button svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .view{min-height:0;overflow:auto;padding:5px 16px 16px;display:none;-webkit-overflow-scrolling:touch}
    .view.on{display:block}
    .view-inner{max-width:760px;margin:0 auto;display:grid;gap:12px}
    .grid{display:grid;gap:10px}
    .two{grid-template-columns:repeat(2,minmax(0,1fr))}
    .three{grid-template-columns:repeat(3,minmax(0,1fr))}
    .row{display:flex;align-items:center;gap:9px}
    .between{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .muted{color:var(--muted)}
    .faint{color:var(--faint)}
    .label{font-size:10.5px;font-weight:850;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
    .chip{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:7px 11px;font-size:12px;font-weight:800;color:var(--muted);background:var(--soft);border:1px solid transparent;transition:transform .18s}
    .chip.on{color:var(--ink);background:color-mix(in srgb,var(--accent) 15%,transparent);border-color:color-mix(in srgb,var(--accent) 38%,transparent)}
    .chip-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
    .chip-row::-webkit-scrollbar{display:none}
    .hero{position:relative;overflow:hidden;border-radius:26px;padding:18px;min-height:188px;display:grid;align-content:end;gap:8px;color:#fff;background:linear-gradient(135deg,#1fbda2,#5a5ff0)}
    .hero:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 78% 12%,rgba(255,255,255,.22),transparent 30%),linear-gradient(to top,rgba(0,0,0,.25),transparent 65%)}
    .hero>*{position:relative}
    .hero-visual{position:absolute;right:12px;top:10px;width:150px;height:110px;opacity:.92}
    .hero h2{font-size:28px;max-width:72%}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .stat{border-radius:17px;padding:10px;background:var(--soft);border:1px solid var(--line);min-width:0}
    .stat b{display:block;font-size:20px;line-height:1}
    .stat span{display:block;font-size:10.5px;color:var(--muted);font-weight:800;margin-top:4px}
    .subject-card,.lesson-card,.profile-card,.mistake-card{border-radius:20px;padding:14px;background:var(--panel2);border:1px solid var(--line);box-shadow:0 10px 30px rgba(40,55,90,.08);transition:transform .18s}
    .lesson-card{width:100%;text-align:left;display:grid;gap:8px}
    .lesson-card.mastered{border-color:color-mix(in srgb,var(--good) 44%,var(--line))}
    .lesson-card.locked{opacity:.55}
    .lesson-card .meta{display:flex;gap:6px;flex-wrap:wrap}
    .progress-bar{height:8px;border-radius:999px;background:var(--soft);overflow:hidden;border:1px solid var(--line)}
    .progress-bar i{display:block;height:100%;width:0;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:999px}
    .nav{height:var(--navh);display:flex;align-items:stretch;justify-content:center;gap:2px;padding:7px 12px max(var(--sab),8px);background:var(--panel2);border-top:1px solid var(--line);backdrop-filter:blur(26px) saturate(1.45);-webkit-backdrop-filter:blur(26px) saturate(1.45)}
    .nav button{flex:1;max-width:120px;border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10.5px;font-weight:850;color:var(--faint)}
    .nav button.on{color:var(--accent2);background:color-mix(in srgb,var(--accent2) 10%,transparent)}
    select,input,textarea{width:100%;border:1px solid var(--line);background:var(--soft);border-radius:15px;padding:11px 12px;outline:none;min-height:44px}
    textarea{resize:vertical;line-height:1.45}
    select:focus,input:focus,textarea:focus{border-color:color-mix(in srgb,var(--accent2) 48%,transparent);box-shadow:0 0 0 4px color-mix(in srgb,var(--accent2) 12%,transparent)}
    .profile-switch{min-width:132px;max-width:180px}
    .stage-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}
    .stage-grid button{min-height:42px;border-radius:15px;background:var(--soft);border:1px solid var(--line);font-weight:850;color:var(--muted)}
    .stage-grid button.on{color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2))}
    .subject-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
    .subject-card{text-align:left;min-height:104px;display:grid;align-content:space-between}
    .subject-card.on{outline:2px solid color-mix(in srgb,var(--accent2) 50%,transparent)}
    .subject-icon{width:38px;height:38px;border-radius:14px;display:grid;place-items:center;color:#fff;font-weight:950;background:linear-gradient(135deg,var(--s1),var(--s2))}
    .lesson-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .screen{position:fixed;inset:0;z-index:40;display:none;grid-template-rows:auto minmax(0,1fr) auto;background:radial-gradient(120% 80% at 82% -10%,color-mix(in srgb,var(--accent) 14%,transparent),transparent 55%),var(--bg0)}
    .screen.on{display:grid}
    .screen-bar{display:flex;align-items:center;gap:10px;padding:calc(10px + var(--sat)) 14px 10px;background:var(--panel);border-bottom:1px solid var(--line);backdrop-filter:blur(24px) saturate(1.25)}
    .screen-body{min-height:0;overflow:auto;padding:14px;max-width:760px;width:100%;margin:0 auto;display:grid;gap:12px}
    .lesson-stage{display:grid;gap:12px}
    .question-card{border-radius:24px;padding:16px;display:grid;gap:13px}
    .answer-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}
    .answer{min-height:58px;border-radius:17px;background:var(--soft);border:1px solid var(--line);padding:12px;text-align:left;font-weight:800}
    .answer.selected{border-color:var(--accent2);background:color-mix(in srgb,var(--accent2) 12%,transparent)}
    .answer.correct{border-color:var(--good);background:color-mix(in srgb,var(--good) 14%,transparent)}
    .answer.wrong{border-color:var(--bad);background:color-mix(in srgb,var(--bad) 11%,transparent)}
    .order-bank,.order-answer{display:flex;flex-wrap:wrap;gap:7px;min-height:48px;padding:8px;border-radius:16px;background:var(--soft);border:1px solid var(--line)}
    .match-row{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:8px;align-items:center}
    .feedback{min-height:42px;border-radius:17px;padding:11px 13px;background:var(--soft);border:1px solid var(--line);font-size:13px;color:var(--muted)}
    .feedback.good{color:var(--good);border-color:color-mix(in srgb,var(--good) 38%,var(--line))}
    .feedback.bad{color:var(--bad);border-color:color-mix(in srgb,var(--bad) 34%,var(--line))}
    .sheet-layer{position:fixed;inset:0;z-index:60;display:none}
    .sheet-layer.on{display:block}
    .scrim{position:absolute;inset:0;background:rgba(4,7,16,.42);backdrop-filter:blur(3px)}
    .sheet{position:absolute;left:0;right:0;bottom:0;max-height:86dvh;border-radius:28px 28px 0 0;padding:10px 18px calc(18px + var(--sab));display:grid;gap:12px;overflow:auto}
    .grab{width:42px;height:5px;border-radius:999px;background:var(--line);margin:2px auto 4px}
    .toast{position:fixed;z-index:70;left:50%;bottom:calc(var(--navh) + 14px);transform:translate(-50%,150px);opacity:0;pointer-events:none;background:#152033;color:#fff;border-radius:999px;padding:11px 17px;font-size:13px;font-weight:800;box-shadow:0 14px 38px rgba(0,0,0,.25);transition:transform .24s,opacity .24s}
    .toast.on{transform:translate(-50%,0);opacity:1}
    .editor{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;min-height:240px}
    .empty{padding:20px;text-align:center;color:var(--muted)}
    @media(max-width:720px){
      .subject-grid{grid-template-columns:repeat(2,1fr)}
      .lesson-list{grid-template-columns:1fr}
      .stats{grid-template-columns:repeat(2,1fr)}
      .hero h2{max-width:100%;font-size:25px}
      .hero-visual{opacity:.28}
      .two,.three{grid-template-columns:1fr}
      .answer-grid{grid-template-columns:1fr}
    }
    @media(min-width:768px){
      .sheet{left:50%;right:auto;bottom:auto;top:50%;transform:translate(-50%,-50%);width:min(560px,calc(100vw - 36px));border-radius:28px}
      .grab{display:none}
    }
    @media(prefers-reduced-motion:reduce){
      *{animation-duration:.001ms!important;transition-duration:.001ms!important}
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark">CP</div>
        <div>
          <h1>Cambridge Primary</h1>
          <p id="contextLine">Local learning path</p>
        </div>
      </div>
      <div class="top-actions">
        <select id="profileSelect" class="profile-switch" aria-label="Child profile"></select>
        <button class="icon-btn" id="themeBtn" aria-label="Toggle theme"></button>
      </div>
    </header>

    <section class="view on" id="view-today"><div class="view-inner" id="todayBody"></div></section>
    <section class="view" id="view-path"><div class="view-inner" id="pathBody"></div></section>
    <section class="view" id="view-practice"><div class="view-inner" id="practiceBody"></div></section>
    <section class="view" id="view-parent"><div class="view-inner" id="parentBody"></div></section>

    <nav class="nav">
      <button class="on" data-tab="today"></button>
      <button data-tab="path"></button>
      <button data-tab="practice"></button>
      <button data-tab="parent"></button>
    </nav>
  </main>

  <section class="screen" id="lessonScreen">
    <div class="screen-bar">
      <button class="icon-btn" id="lessonBack" aria-label="Back"></button>
      <div style="min-width:0">
        <h3 id="lessonScreenTitle">Lesson</h3>
        <p class="small" id="lessonScreenSub">Stage</p>
      </div>
    </div>
    <div class="screen-body" id="lessonBody"></div>
    <div class="screen-bar">
      <div class="feedback" id="feedbackBox">Ready.</div>
      <button class="btn" id="lessonAction">Start</button>
    </div>
  </section>

  <div class="sheet-layer" id="sheetLayer">
    <div class="scrim" id="scrim"></div>
    <div class="sheet glass">
      <div class="grab"></div>
      <div class="between">
        <h2 id="sheetTitle">Sheet</h2>
        <button class="chip" id="sheetClose">Close</button>
      </div>
      <div id="sheetBody"></div>
    </div>
  </div>

  <div class="toast" id="toast">Saved</div>

  <script>
    "use strict";

    const APP_ID = "cambridge-primary";
    const STORE_KEY = "kinetik_cambridge_primary_v1";
    const DAY = () => new Date().toISOString().slice(0,10);
    const $ = (id) => document.getElementById(id);
    const $$ = (selector, root=document) => [...root.querySelectorAll(selector)];
    const esc = (value) => String(value ?? "").replace(/[&<>"']/g, (m) => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
    const uid = (prefix) => prefix + "_" + Math.random().toString(36).slice(2,9);
    const norm = (value) => String(value ?? "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9 ]/g,"").replace(/\s+/g," ").trim();
    const clone = (value) => JSON.parse(JSON.stringify(value));

    const SUBJECTS = [
      {id:"english",name:"English",code:"0058",short:"Eng",color:["#14b8a6","#4f46e5"],strands:["Reading","Writing","Speaking and Listening"],source:"https://www.cambridgeinternational.org/programmes-and-qualifications/cambridge-primary/curriculum/english/"},
      {id:"math",name:"Mathematics",code:"0096",short:"Math",color:["#f59e0b","#ef476f"],strands:["Number","Geometry and Measure","Statistics and Probability","Thinking and Working Mathematically"],source:"https://www.cambridgeinternational.org/programmes-and-qualifications/cambridge-primary/curriculum/mathematics/"},
      {id:"science",name:"Science",code:"0097",short:"Sci",color:["#22c55e","#0ea5e9"],strands:["Biology","Chemistry","Physics","Earth and Space","Thinking and Working Scientifically","Science in Context"],source:"https://www.cambridgeinternational.org/programmes-and-qualifications/cambridge-primary/curriculum/science/"},
      {id:"french",name:"French",code:"0064",short:"Fr",color:["#8b5cf6","#06b6d4"],strands:["Listening","Reading","Speaking","Writing","Vocabulary","Grammar","Cultural understanding"],source:"https://www.cambridgeinternational.org/programmes-and-qualifications/cambridge-primary/curriculum/modern-foreign-language/"}
    ];

    const sourceRef = {
      programme:"https://www.cambridgeinternational.org/programmes-and-qualifications/cambridge-primary",
      curriculum:"https://www.cambridgeinternational.org/programmes-and-qualifications/cambridge-primary/curriculum/",
      stages:"https://help.cambridgeinternational.org/hc/en-gb/articles/360000048218-At-what-age-should-children-start-following-Cambridge-Primary-curriculum-frameworks"
    };

    function objective(subject, stage, strand, slug, title){
      return {id:`cp-${subject}-s${stage}-${slug}`, title, strand, cambridgeObjectiveRef:null};
    }
    function ex(type, prompt, payload){
      return {id:uid("ex"), type, prompt, ...payload};
    }
    function lesson(data){
      const subject = SUBJECTS.find((item) => item.id === data.subject);
      return {
        programme:"cambridge-primary",
        subjectCode:subject.code,
        subject:subject.name,
        subjectId:subject.id,
        stage:data.stage,
        strand:data.strand,
        unitId:data.unitId,
        lessonId:data.lessonId,
        title:data.title,
        sourceRef:{programme:sourceRef.programme,curriculum:sourceRef.curriculum,subject:subject.source,stages:sourceRef.stages},
        objectives:data.objectives,
        explanation:data.explanation,
        examples:data.examples,
        exercises:data.exercises,
        mastery:{passPercent:80,minQuestions:6,reviewBelowPercent:80, ...data.mastery}
      };
    }

    const CURRICULUM = [
      lesson({subject:"english",stage:1,strand:"Reading",unitId:"s1-sentences",lessonId:"cp-english-s1-sentence-signals",title:"Sentence Signals",objectives:[objective("english",1,"Reading","sentence-signals","Recognise simple sentences, capital letters and full stops.")],explanation:"A sentence is a complete thought. In English, a sentence usually starts with a capital letter and ends with a full stop, question mark, or exclamation mark.",examples:["The cat sleeps.","Where is the red bag?","I can jump!"],exercises:[ex("mcq","Which one is a complete sentence?",{options:["runs fast","The dog runs fast.","under the table","blue pencil"],answer:"The dog runs fast."}),ex("truefalse","A sentence should start with a capital letter.",{answer:true}),ex("text","Type the missing capital letter: __ina has a book.",{answers:["K"],hint:"It is the first letter of a name."}),ex("order","Put the words into a sentence.",{items:["The","bird","sings"],answer:["The","bird","sings"]}),ex("mcq","Which mark best ends this question: What is your name",{options:[".","?","!","-"],answer:"?"}),ex("short","Write one short sentence about a toy.",{keywords:["."],sample:"The ball is red."})]}),
      lesson({subject:"english",stage:2,strand:"Reading",unitId:"s2-story-order",lessonId:"cp-english-s2-story-sequence",title:"Story Sequence",objectives:[objective("english",2,"Reading","story-sequence","Sequence events in a short story using beginning, middle and end.")],explanation:"Stories happen in order. The beginning introduces people and places, the middle shows what happens, and the end shows how it finishes.",examples:["Beginning: Mina finds a map.","Middle: She follows it to a garden.","End: She shares the flowers with her class."],exercises:[ex("mcq","Which event sounds like a beginning?",{options:["They solved the problem.","A boy opened a mysterious box.","Everyone went home happily.","The prize was given."],answer:"A boy opened a mysterious box."}),ex("order","Put the story events in order.",{items:["Sara lost her key.","Sara searched her bag.","Sara found it under a book."],answer:["Sara lost her key.","Sara searched her bag.","Sara found it under a book."]}),ex("mcq","What does the middle of a story usually show?",{options:["The title only","What happens or goes wrong","The page number","A list of spellings"],answer:"What happens or goes wrong"}),ex("truefalse","The ending should help the reader understand how the story finishes.",{answer:true}),ex("text","Complete the phrase: beginning, middle and ___.",{answers:["end","ending"]}),ex("short","Write a one-sentence ending for: The kite flew into a tree.",{keywords:["kite"],sample:"Dad lifted the kite down safely."})]}),
      lesson({subject:"english",stage:3,strand:"Writing",unitId:"s3-paragraphs",lessonId:"cp-english-s3-paragraph-builder",title:"Paragraph Builder",objectives:[objective("english",3,"Writing","paragraph-main-idea","Write a short paragraph with a main idea and supporting details.")],explanation:"A paragraph groups sentences about one main idea. A strong paragraph has a topic sentence and details that stay on the same subject.",examples:["Topic: Our school garden is useful. Details: It grows herbs, gives shade, and helps us learn about plants."],exercises:[ex("mcq","Which sentence is a good topic sentence?",{options:["Also it is green.","My bicycle is useful for many reasons.","Because yesterday.","Then we left."],answer:"My bicycle is useful for many reasons."}),ex("mcq","Which detail fits: My bicycle is useful.",{options:["It helps me get to the shop.","The moon is bright.","Soup can be hot.","Cats sleep a lot."],answer:"It helps me get to the shop."}),ex("order","Put the paragraph in a sensible order.",{items:["My lunchbox is organised.","Fruit is in one corner.","A sandwich is wrapped in paper."],answer:["My lunchbox is organised.","Fruit is in one corner.","A sandwich is wrapped in paper."]}),ex("truefalse","A paragraph should jump between many unrelated topics.",{answer:false}),ex("text","A sentence that tells the main idea is called a ___ sentence.",{answers:["topic"]}),ex("short","Write a topic sentence about a rainy day.",{keywords:["rain"],sample:"A rainy day can still be fun."})]}),

    function defaultStore(){
      return {
        version:1,
        backendMode:"local",
        theme:"light",
        activeTab:"today",
        activeProfileId:"baginda",
        filters:{subject:"math",stage:5},
        profiles:[
          {id:"baginda",name:"Baginda",avatar:"B",color:"#4f46e5",stageBySubject:{english:5,math:5,science:5,french:5}},
          {id:"keyla",name:"Keyla",avatar:"K",color:"#06b6d4",stageBySubject:{english:2,math:2,science:2,french:1}}
        ],
        progress:{},
        overrides:{}
      };
    }

    function ensureProgress(profileId){
      state.progress[profileId] ||= {attempts:[],mastery:{},lessonStatus:{},mistakes:[],streak:0,lastStudyDate:"",lastLessonId:""};
      return state.progress[profileId];
    }

    const Bridge = {
      embedded: window.parent && window.parent !== window,
      context:{circleId:"standalone_demo",circleType:"family",personId:"local_person",role:"parent",theme:"light",backendMode:"local"},
      send(type, payload={}){
        if(!this.embedded) return;
        const msg = {type, appId:APP_ID, payload};
        if(type === "SHOW_TOAST") msg.message = payload.message || "";
        window.parent.postMessage(msg, "*");
      }
    };

    const LearningBackendAdapter = {
      mode:"local",
      loadProfiles(){ return clone(state.profiles); },
      saveProfile(profile){ const i = state.profiles.findIndex((p) => p.id === profile.id); if(i >= 0) state.profiles[i] = profile; else state.profiles.push(profile); save(); this.emit("cambridge_profiles", profile); },
      loadProgress(profileId){ return clone(ensureProgress(profileId)); },
      recordAttempt(attempt){ const progress = ensureProgress(attempt.profileId); progress.attempts.unshift(attempt); progress.attempts = progress.attempts.slice(0,120); this.emit("cambridge_attempts", attempt); save(); },
      saveMastery(profileId, objectiveId, value){ const progress = ensureProgress(profileId); progress.mastery[objectiveId] = value; this.emit("cambridge_mastery", {profileId,objectiveId,value,updatedAt:new Date().toISOString()}); save(); },
      loadContentOverrides(){ return clone(state.overrides); },
      saveContentOverride(lessonId, lessonData){ state.overrides[lessonId] = lessonData; this.emit("cambridge_content_overrides", {lessonId,lessonData,updatedAt:new Date().toISOString()}); save(); },
      exportSnapshot(){ return JSON.stringify({exportedAt:new Date().toISOString(),store:state}, null, 2); },
      importSnapshot(text){ const parsed = JSON.parse(text); const next = parsed.store || parsed; state = mergeStore(next); save(); this.emit("cambridge_snapshots", {importedAt:new Date().toISOString(),profileCount:state.profiles.length}); },
      emit(collection, payload){ if(this.mode === "bridge-v1" || Bridge.embedded){ Bridge.send("DATA_CREATE", {collection, payload}); } }
    };

    let state = mergeStore(readStore());
    let activeSession = null;
    let selectedAnswer = null;
    let orderAnswer = [];
    let checked = false;

    function readStore(){
      try{return JSON.parse(localStorage.getItem(STORE_KEY) || "null") || defaultStore();}
      catch{return defaultStore();}
    }
    function mergeStore(raw){
      const base = defaultStore();
      return {
        ...base,
        ...raw,
        filters:{...base.filters,...(raw.filters || {})},
        profiles:Array.isArray(raw.profiles) && raw.profiles.length ? raw.profiles : base.profiles,
        progress:raw.progress || {},
        overrides:raw.overrides || {}
      };
    }
    function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
    function lessons(){
      return CURRICULUM.map((lessonData) => state.overrides[lessonData.lessonId] ? {...lessonData, ...state.overrides[lessonData.lessonId]} : lessonData);
    }
    function lessonById(id){ return lessons().find((item) => item.lessonId === id); }
    function subject(id){ return SUBJECTS.find((item) => item.id === id); }
    function profile(){ return state.profiles.find((item) => item.id === state.activeProfileId) || state.profiles[0]; }
    function profileStage(subjectId){ return Number(profile().stageBySubject?.[subjectId] || 1); }
    function progress(){ return ensureProgress(profile().id); }
    function filteredLessons(){
      return lessons().filter((item) => item.subjectId === state.filters.subject && item.stage === Number(state.filters.stage));
    }
    function allProfileLessons(){
      return lessons().filter((item) => item.stage <= profileStage(item.subjectId));
    }
    function lessonStatus(lessonId){ return progress().lessonStatus[lessonId] || {attempts:0,best:0,mastered:false}; }
    function masteryValue(objectiveId){ return progress().mastery[objectiveId] || 0; }
    function subjectCoverage(subjectId){
      const profileLessons = lessons().filter((item) => item.subjectId === subjectId && item.stage <= profileStage(subjectId));
      const objectiveIds = [...new Set(profileLessons.flatMap((item) => item.objectives.map((obj) => obj.id)))];
      if(!objectiveIds.length) return 0;
      const total = objectiveIds.reduce((sum,id) => sum + Math.min(100, masteryValue(id)), 0);
      return Math.round(total / objectiveIds.length);
    }
    function todayRecommendation(){
      const weak = allProfileLessons().find((item) => item.objectives.some((obj) => masteryValue(obj.id) > 0 && masteryValue(obj.id) < 80));
      if(weak) return weak;
      const currentStage = lessons().filter((item) => item.stage === profileStage(item.subjectId));
      return currentStage.find((item) => !lessonStatus(item.lessonId).mastered) || currentStage[0] || allProfileLessons().find((item) => !lessonStatus(item.lessonId).mastered) || allProfileLessons()[0] || lessons()[0];
    }
    function weakObjectives(){
      return allProfileLessons().flatMap((item) => item.objectives.map((obj) => ({...obj, lesson:item, value:masteryValue(obj.id)}))).filter((item) => item.value > 0 && item.value < 80).slice(0,8);
    }

    function icon(name){
      const icons = {
        sun:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19"/></svg>',
        moon:'<svg viewBox="0 0 24 24"><path d="M20 15.2A8.5 8.5 0 0 1 8.8 4 7 7 0 1 0 20 15.2Z"/></svg>',
        today:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
        path:'<svg viewBox="0 0 24 24"><path d="M5 19c5-1 4-8 9-8h5"/><path d="M15 7l4 4-4 4"/><circle cx="5" cy="19" r="2"/><circle cx="5" cy="5" r="2"/></svg>',
        practice:'<svg viewBox="0 0 24 24"><path d="M4 19V5a2 2 0 0 1 2-2h12v18H6a2 2 0 0 1-2-2Z"/><path d="M8 7h6M8 11h7M8 15h5"/></svg>',
        parent:'<svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="4"/><path d="M2.5 21c.7-4 3.1-6 6.5-6s5.8 2 6.5 6"/><path d="M17 11.5a3 3 0 1 0 0-6"/><path d="M17 15c2.5.3 4 2 4.5 5"/></svg>',
        back:'<svg viewBox="0 0 24 24"><path d="M15 5 8 12l7 7"/></svg>',
        play:'<svg viewBox="0 0 24 24"><path d="m8 5 11 7-11 7Z"/></svg>',
        volume:'<svg viewBox="0 0 24 24"><path d="M4 9v6h4l5 4V5L8 9H4Z"/><path d="M17 9.5a4 4 0 0 1 0 5"/></svg>'
      };
      return icons[name] || "";
    }

    function init(){
      if(Bridge.embedded) document.body.classList.add("embedded");
      document.documentElement.dataset.theme = state.theme;
      LearningBackendAdapter.mode = Bridge.embedded ? "bridge-v1" : state.backendMode;
      wire();
      renderAll();
      addEventListener("message", onMessage);
    }

    function onMessage(event){
      const msg = event.data || {};
      if(msg.type !== "INIT_APP") return;
      Bridge.context = {...Bridge.context, ...(msg.payload || {})};
      if(Bridge.context.theme) {
        state.theme = Bridge.context.theme === "dark" ? "dark" : "light";
        document.documentElement.dataset.theme = state.theme;
      }
      state.backendMode = "bridge-v1";
      LearningBackendAdapter.mode = "bridge-v1";
      $("contextLine").textContent = `${Bridge.context.circleType || "family"} circle`;
      save();
      renderAll();
    }

    function wire(){
      $("themeBtn").onclick = () => {state.theme = state.theme === "dark" ? "light" : "dark"; document.documentElement.dataset.theme = state.theme; save(); renderTop();};
      $("profileSelect").onchange = (event) => {state.activeProfileId = event.target.value; save(); renderAll();};
      $$(".nav button").forEach((button) => button.onclick = () => switchTab(button.dataset.tab));
      $("lessonBack").onclick = closeLesson;
      $("lessonAction").onclick = lessonAction;
      $("sheetClose").onclick = closeSheet;
      $("scrim").onclick = closeSheet;
      document.querySelector("[data-tab='today']").innerHTML = icon("today") + "Today";
      document.querySelector("[data-tab='path']").innerHTML = icon("path") + "Path";
      document.querySelector("[data-tab='practice']").innerHTML = icon("practice") + "Practice";
      document.querySelector("[data-tab='parent']").innerHTML = icon("parent") + "Parent";
      $("lessonBack").innerHTML = icon("back");
    }

    function switchTab(tab){
      state.activeTab = tab;
      save();
      $$(".view").forEach((view) => view.classList.toggle("on", view.id === "view-" + tab));
      $$(".nav button").forEach((button) => button.classList.toggle("on", button.dataset.tab === tab));
      renderView(tab);
    }

    function renderAll(){
      renderTop();
      ["today","path","practice","parent"].forEach(renderView);
      switchTab(state.activeTab || "today");
    }
    function renderView(tab){
      if(tab === "today") renderToday();
      if(tab === "path") renderPath();
      if(tab === "practice") renderPractice();
      if(tab === "parent") renderParent();
    }
    function renderTop(){
      $("themeBtn").innerHTML = icon(state.theme === "dark" ? "sun" : "moon");
      $("profileSelect").innerHTML = state.profiles.map((item) => `<option value="${item.id}" ${item.id === state.activeProfileId ? "selected" : ""}>${esc(item.name)}</option>`).join("");
      $("contextLine").textContent = Bridge.embedded ? `${Bridge.context.circleType || "family"} circle` : "Standalone local mode";
    }

    function renderToday(){
      const p = profile();
      const rec = todayRecommendation();
      const prog = progress();
      const totalDone = Object.values(prog.lessonStatus).filter((item) => item.mastered).length;
      const weak = weakObjectives();
      $("todayBody").innerHTML = `
        <section class="hero">
          ${heroSvg()}
          <span class="label" style="color:rgba(255,255,255,.72)">Today's mission</span>
          <h2>${esc(p.name)}, keep one skill moving.</h2>
          <p>${esc(rec.subject)} Stage ${rec.stage} - ${esc(rec.strand)}</p>
          <button class="btn" style="width:max-content;background:rgba(255,255,255,.92);color:#102033;box-shadow:none" data-start="${rec.lessonId}">${icon("play")} Start ${esc(rec.title)}</button>
        </section>
        <section class="stats">
          <div class="stat"><b>${prog.streak}</b><span>day streak</span></div>
          <div class="stat"><b>${totalDone}</b><span>mastered</span></div>
          <div class="stat"><b>${averageMastery()}%</b><span>mastery</span></div>
          <div class="stat"><b>${prog.mistakes.length}</b><span>review</span></div>
        </section>
        <section class="card glass grid">
          <div class="between"><div><span class="label">Recommended</span><h2>${esc(rec.title)}</h2><p class="small">${esc(rec.explanation.slice(0,130))}...</p></div><span class="chip on">Stage ${rec.stage}</span></div>
          <div class="progress-bar"><i style="width:${lessonStatus(rec.lessonId).best}%"></i></div>
          <button class="btn" data-start="${rec.lessonId}">Continue Lesson</button>
        </section>
        <section class="card glass grid">
          <div class="between"><h3>Needs review</h3><span class="small">${weak.length || "clear"}</span></div>
          ${weak.length ? weak.map((item) => `<button class="lesson-card" data-start="${item.lesson.lessonId}"><span class="label">${esc(item.lesson.subject)} - Stage ${item.lesson.stage}</span><b>${esc(item.title)}</b><div class="progress-bar"><i style="width:${item.value}%"></i></div></button>`).join("") : `<div class="empty">No weak objectives yet. Complete a lesson to start tracking mastery.</div>`}
        </section>`;
      bindStarts($("todayBody"));
    }

    function averageMastery(){
      const values = Object.values(progress().mastery);
      if(!values.length) return 0;
      return Math.round(values.reduce((a,b) => a + b, 0) / values.length);
    }

    function heroSvg(){
      return `<svg class="hero-visual" viewBox="0 0 180 130" aria-hidden="true">
        <defs><linearGradient id="bookg" x1="0" x2="1"><stop stop-color="#fff" stop-opacity=".92"/><stop offset="1" stop-color="#fff" stop-opacity=".45"/></linearGradient></defs>
        <path d="M28 32c28-10 47 2 62 16 15-14 34-26 62-16v70c-29-8-48 0-62 14-14-14-33-22-62-14Z" fill="url(#bookg)"/>
        <path d="M90 48v68" stroke="#fff" stroke-width="4" opacity=".72"/>
        <circle cx="135" cy="42" r="18" fill="#fff" opacity=".22"/>
        <path d="M50 62h28M50 76h26M104 62h31M104 76h24" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity=".7"/>
      </svg>`;
    }

    function renderPath(){
      const activeSubject = subject(state.filters.subject);
      $("pathBody").innerHTML = `
        <section class="card glass grid">
          <div class="between"><div><span class="label">Learning path</span><h2>${esc(activeSubject.name)} Stage ${state.filters.stage}</h2></div><span class="chip">${activeSubject.code}</span></div>
          <div class="subject-grid">
            ${SUBJECTS.map((item) => `<button class="subject-card ${item.id === state.filters.subject ? "on" : ""}" data-subject="${item.id}" style="--s1:${item.color[0]};--s2:${item.color[1]}"><span class="subject-icon">${item.short}</span><b>${esc(item.name)}</b><span class="small">${item.code}</span></button>`).join("")}
          </div>
          <div class="stage-grid">${[1,2,3,4,5,6].map((stage) => `<button class="${Number(state.filters.stage) === stage ? "on" : ""}" data-stage="${stage}">S${stage}</button>`).join("")}</div>
        </section>
        <section class="lesson-list">
          ${filteredLessons().map(renderLessonCard).join("") || `<div class="empty">No lessons for this filter.</div>`}
        </section>`;
      $$("[data-subject]", $("pathBody")).forEach((button) => button.onclick = () => {state.filters.subject = button.dataset.subject; state.filters.stage = profileStage(button.dataset.subject); save(); renderPath();});
      $$("[data-stage]", $("pathBody")).forEach((button) => button.onclick = () => {state.filters.stage = Number(button.dataset.stage); save(); renderPath();});
      bindStarts($("pathBody"));
    }

    function renderLessonCard(item){
      const status = lessonStatus(item.lessonId);
      const locked = item.stage > profileStage(item.subjectId);
      return `<button class="lesson-card ${status.mastered ? "mastered" : ""} ${locked ? "locked" : ""}" ${locked ? "" : `data-start="${item.lessonId}"`}>
        <div class="between"><span class="label">${esc(item.subject)} - Stage ${item.stage}</span><span class="chip ${status.mastered ? "on" : ""}">${status.mastered ? "Mastered" : `${status.best}%`}</span></div>
        <h3>${esc(item.title)}</h3>
        <p class="small">${esc(item.strand)} - ${esc(item.objectives[0].title)}</p>
        <div class="meta"><span class="chip">${item.exercises.length} questions</span><span class="chip">${item.subjectCode}</span></div>
        <div class="progress-bar"><i style="width:${status.best || 0}%"></i></div>
      </button>`;
    }

    function renderPractice(){
      const prog = progress();
      const weak = weakObjectives();
      const mistakes = prog.mistakes.slice(0,12);
      $("practiceBody").innerHTML = `
        <section class="card glass grid">
          <div class="between"><div><span class="label">Practice</span><h2>Review loop</h2><p class="small">Mistakes and lower-mastery objectives appear here automatically.</p></div><button class="btn" id="mixedReview">Mixed review</button></div>
        </section>
        <section class="grid">
          <h3>Weak objectives</h3>
          ${weak.length ? weak.map((item) => `<button class="lesson-card" data-start="${item.lesson.lessonId}"><span class="label">${esc(item.lesson.subject)} S${item.lesson.stage}</span><b>${esc(item.title)}</b><div class="progress-bar"><i style="width:${item.value}%"></i></div></button>`).join("") : `<div class="card glass empty">No weak objectives yet.</div>`}
        </section>
        <section class="grid">
          <h3>Recent mistakes</h3>
          ${mistakes.length ? mistakes.map((item) => `<div class="mistake-card"><span class="label">${esc(item.subject)} - ${esc(item.lessonTitle)}</span><b>${esc(item.prompt)}</b><p class="small">Answer: ${esc(item.answerText)}</p><button class="chip on" data-start="${item.lessonId}">Practice this lesson</button></div>`).join("") : `<div class="card glass empty">Mistakes will appear here after lessons.</div>`}
        </section>`;
      $("mixedReview").onclick = startMixedReview;
      bindStarts($("practiceBody"));
    }

    function renderParent(){
      const p = profile();
      $("parentBody").innerHTML = `
        <section class="card glass grid">
          <div class="between"><div><span class="label">Parent dashboard</span><h2>${esc(p.name)}</h2><p class="small">Profiles, stage placement, mastery and content controls.</p></div><button class="btn secondary" id="addProfile">Add child</button></div>
          <div class="grid two">
            ${SUBJECTS.map((item) => `<label><span class="small">${esc(item.name)} stage</span><select data-stage-set="${item.id}">${[1,2,3,4,5,6].map((stage) => `<option value="${stage}" ${profileStage(item.id) === stage ? "selected" : ""}>Stage ${stage}</option>`).join("")}</select></label>`).join("")}
          </div>
        </section>
        <section class="stats">
          ${SUBJECTS.map((item) => `<div class="stat"><b>${subjectCoverage(item.id)}%</b><span>${item.short}</span></div>`).join("")}
        </section>
        <section class="card glass grid">
          <div class="between"><h3>Child profiles</h3><span class="small">${state.profiles.length}</span></div>
          ${state.profiles.map((item) => `<div class="profile-card between"><span class="row"><span class="subject-icon" style="--s1:${item.color};--s2:${item.color}">${esc(item.avatar)}</span><span><b>${esc(item.name)}</b><span class="small" style="display:block">English S${item.stageBySubject.english} - Math S${item.stageBySubject.math} - Science S${item.stageBySubject.science} - French S${item.stageBySubject.french}</span></span></span><button class="chip" data-edit-profile="${item.id}">Edit</button></div>`).join("")}
        </section>
        <section class="card glass grid">
          <div class="between"><div><h3>Content editor</h3><p class="small">Edit one lesson at a time. Overrides stay local and can be exported.</p></div><span class="chip">${lessons().length} lessons</span></div>
          <div class="grid two"><button class="btn secondary" id="openEditor">Edit lesson JSON</button><button class="btn secondary" id="exportBtn">Export snapshot</button><button class="btn secondary" id="importBtn">Import snapshot</button><button class="btn danger" id="resetBtn">Reset local data</button></div>
        </section>`;
      $$("[data-stage-set]", $("parentBody")).forEach((select) => select.onchange = () => {p.stageBySubject[select.dataset.stageSet] = Number(select.value); LearningBackendAdapter.saveProfile(p); renderAll();});
      $("addProfile").onclick = openAddProfile;
      $$("[data-edit-profile]", $("parentBody")).forEach((button) => button.onclick = () => openEditProfile(button.dataset.editProfile));
      $("openEditor").onclick = openEditor;
      $("exportBtn").onclick = openExport;
      $("importBtn").onclick = openImport;
      $("resetBtn").onclick = openReset;
    }

    function bindStarts(root){
      $$("[data-start]", root).forEach((button) => button.onclick = () => startLesson(button.dataset.start));
    }

    function startMixedReview(){
      const source = weakObjectives().map((item) => item.lesson);
      const picked = source[0] || todayRecommendation();
      startLesson(picked.lessonId);
    }

    function startLesson(lessonId){
      const item = lessonById(lessonId);
      if(!item) return toast("Lesson not found");
      activeSession = {lesson:item,index:-1,score:0,answers:[],misses:[],mode:"intro",startedAt:new Date().toISOString()};
      $("lessonScreenTitle").textContent = item.title;
      $("lessonScreenSub").textContent = `${item.subject} ${item.subjectCode} - Stage ${item.stage} - ${item.strand}`;
      $("lessonScreen").classList.add("on");
      renderLessonIntro();
    }
    function closeLesson(){ $("lessonScreen").classList.remove("on"); activeSession = null; selectedAnswer = null; orderAnswer = []; checked = false; renderAll(); }
    function renderLessonIntro(){
      const item = activeSession.lesson;
      $("feedbackBox").className = "feedback";
      $("feedbackBox").textContent = "Read the model, then start the questions.";
      $("lessonAction").textContent = "Start Questions";
      $("lessonBody").innerHTML = `
        <section class="card glass lesson-stage">
          <span class="label">${esc(item.subject)} - Stage ${item.stage}</span>
          <h2>${esc(item.title)}</h2>
          <p class="muted">${esc(item.explanation)}</p>
          <div class="grid">${item.examples.map((example) => `<div class="feedback">${esc(example)}</div>`).join("")}</div>
          <div class="chip-row">${item.objectives.map((obj) => `<span class="chip on">${esc(obj.id)}</span>`).join("")}</div>
        </section>`;
    }
    function lessonAction(){
      if(!activeSession) return;
      if(activeSession.mode === "intro"){ nextQuestion(); return; }
      if(activeSession.mode === "question" && !checked){ checkAnswer(); return; }
      if(activeSession.mode === "question" && checked){ nextQuestion(); return; }
      if(activeSession.mode === "done"){ closeLesson(); }
    }
    function nextQuestion(){
      activeSession.index += 1;
      selectedAnswer = null;
      orderAnswer = [];
      checked = false;
      if(activeSession.index >= activeSession.lesson.exercises.length){ finishLesson(); return; }
      activeSession.mode = "question";
      renderQuestion();
    }
    function renderQuestion(){
      const item = activeSession.lesson;
      const q = item.exercises[activeSession.index];
      $("lessonAction").textContent = "Check";
      $("feedbackBox").className = "feedback";
      $("feedbackBox").textContent = `Question ${activeSession.index + 1} of ${item.exercises.length}`;
      let body = "";
      if(q.type === "mcq" || q.type === "listen"){
        body = `${q.type === "listen" ? `<button class="btn secondary" id="speakBtn">${icon("volume")} Listen</button>` : ""}
          <div class="answer-grid">${q.options.map((option) => `<button class="answer" data-choice="${esc(option)}">${esc(option)}</button>`).join("")}</div>`;
      } else if(q.type === "truefalse"){
        body = `<div class="answer-grid"><button class="answer" data-choice="true">True</button><button class="answer" data-choice="false">False</button></div>`;
      } else if(q.type === "text" || q.type === "short"){
        body = `<textarea id="textAnswer" rows="4" placeholder="Type your answer"></textarea>${q.hint ? `<p class="small">${esc(q.hint)}</p>` : ""}`;
      } else if(q.type === "order"){
        body = `<div class="label">Build the answer</div><div class="order-answer" id="orderAnswer"></div><div class="label">Tap words</div><div class="order-bank">${shuffle(q.items).map((word) => `<button class="chip" data-order="${esc(word)}">${esc(word)}</button>`).join("")}</div><button class="chip" id="clearOrder">Clear</button>`;
      } else if(q.type === "match"){
        const rights = shuffle(q.pairs.map((pair) => pair[1]));
        body = `<div class="grid">${q.pairs.map((pair,index) => `<div class="match-row"><b>${esc(pair[0])}</b><select data-match="${index}"><option value="">Choose</option>${rights.map((right) => `<option value="${esc(right)}">${esc(right)}</option>`).join("")}</select></div>`).join("")}</div>`;
      }
      $("lessonBody").innerHTML = `<section class="question-card glass"><span class="label">${esc(q.type)}</span><h2>${esc(q.prompt)}</h2>${body}</section>`;
      if(q.type === "listen") $("speakBtn").onclick = () => speak(q.say || q.prompt);
      $$("[data-choice]", $("lessonBody")).forEach((button) => button.onclick = () => {selectedAnswer = button.dataset.choice; $$("[data-choice]", $("lessonBody")).forEach((b) => b.classList.toggle("selected", b === button));});
      $$("[data-order]", $("lessonBody")).forEach((button) => button.onclick = () => {orderAnswer.push(button.dataset.order); button.disabled = true; renderOrderAnswer();});
      const clear = $("clearOrder"); if(clear) clear.onclick = () => {orderAnswer = []; $$("[data-order]", $("lessonBody")).forEach((button) => button.disabled = false); renderOrderAnswer();};
    }
    function renderOrderAnswer(){ const box = $("orderAnswer"); if(box) box.innerHTML = orderAnswer.map((word) => `<span class="chip on">${esc(word)}</span>`).join(""); }
    function checkAnswer(){
      const q = activeSession.lesson.exercises[activeSession.index];
      const result = evaluate(q);
      checked = true;
      activeSession.answers.push({questionId:q.id,correct:result.correct,answer:result.answerText});
      if(result.correct) activeSession.score += 1;
      else activeSession.misses.push({lessonId:activeSession.lesson.lessonId,lessonTitle:activeSession.lesson.title,subject:activeSession.lesson.subject,prompt:q.prompt,answerText:result.expectedText,at:new Date().toISOString()});
      paintAnswers(q, result);
      $("feedbackBox").className = "feedback " + (result.correct ? "good" : "bad");
      $("feedbackBox").textContent = result.correct ? "Correct. Nice work." : `Review: ${result.expectedText}`;
      $("lessonAction").textContent = activeSession.index + 1 >= activeSession.lesson.exercises.length ? "Finish" : "Next";
    }
    function evaluate(q){
      let answerText = "";
      let correct = false;
      let expectedText = "";
      if(q.type === "mcq" || q.type === "listen"){ answerText = selectedAnswer || ""; expectedText = q.answer; correct = norm(answerText) === norm(q.answer); }
      if(q.type === "truefalse"){ answerText = selectedAnswer || ""; expectedText = String(q.answer); correct = answerText === String(q.answer); }
      if(q.type === "text"){ answerText = $("textAnswer")?.value || ""; expectedText = (q.answers || []).join(" / "); correct = (q.answers || []).some((ans) => norm(ans) === norm(answerText)); }
      if(q.type === "short"){ answerText = $("textAnswer")?.value || ""; expectedText = q.sample || (q.keywords || []).join(", "); correct = (q.keywords || []).some((key) => norm(answerText).includes(norm(key))) || norm(answerText).length >= 18; }
      if(q.type === "order"){ answerText = orderAnswer.join(" "); expectedText = q.answer.join(" "); correct = norm(answerText) === norm(expectedText); }
      if(q.type === "match"){
        const values = $$("[data-match]", $("lessonBody")).map((select) => select.value);
        answerText = values.join(" | ");
        expectedText = q.pairs.map((pair) => `${pair[0]} = ${pair[1]}`).join("; ");
        correct = q.pairs.every((pair,index) => values[index] === pair[1]);
      }
      return {correct,answerText,expectedText};
    }
    function paintAnswers(q, result){
      if(q.type === "mcq" || q.type === "listen"){
        $$("[data-choice]", $("lessonBody")).forEach((button) => { if(norm(button.dataset.choice) === norm(q.answer)) button.classList.add("correct"); else if(button.classList.contains("selected")) button.classList.add("wrong"); });
      }
      if(q.type === "truefalse"){
        $$("[data-choice]", $("lessonBody")).forEach((button) => { if(button.dataset.choice === String(q.answer)) button.classList.add("correct"); else if(button.classList.contains("selected")) button.classList.add("wrong"); });
      }
    }
    function finishLesson(){
      const item = activeSession.lesson;
      const pct = Math.round((activeSession.score / item.exercises.length) * 100);
      const prog = progress();
      const old = lessonStatus(item.lessonId);
      prog.lessonStatus[item.lessonId] = {attempts:(old.attempts || 0) + 1,best:Math.max(old.best || 0, pct),mastered:pct >= item.mastery.passPercent,lastScore:pct,lastAt:new Date().toISOString()};
      prog.mistakes = [...activeSession.misses, ...prog.mistakes].slice(0,80);
      prog.lastLessonId = item.lessonId;
      if(prog.lastStudyDate !== DAY()){ prog.streak += 1; prog.lastStudyDate = DAY(); }
      item.objectives.forEach((obj) => LearningBackendAdapter.saveMastery(profile().id, obj.id, Math.max(masteryValue(obj.id), pct)));
      LearningBackendAdapter.recordAttempt({profileId:profile().id,lessonId:item.lessonId,subject:item.subject,stage:item.stage,scorePercent:pct,correct:activeSession.score,total:item.exercises.length,misses:activeSession.misses,startedAt:activeSession.startedAt,finishedAt:new Date().toISOString()});
      activeSession.mode = "done";
      $("lessonAction").textContent = "Done";
      $("feedbackBox").className = "feedback " + (pct >= item.mastery.passPercent ? "good" : "bad");
      $("feedbackBox").textContent = pct >= item.mastery.passPercent ? "Mastery reached." : "Saved for review.";
      $("lessonBody").innerHTML = `<section class="card glass grid"><span class="label">Result</span><h2>${pct}%</h2><p class="muted">${activeSession.score} of ${item.exercises.length} correct in ${esc(item.title)}.</p><div class="progress-bar"><i style="width:${pct}%"></i></div>${activeSession.misses.length ? `<div class="grid"><h3>Review next</h3>${activeSession.misses.map((miss) => `<div class="feedback bad">${esc(miss.prompt)}<br><span class="small">Answer: ${esc(miss.answerText)}</span></div>`).join("")}</div>` : `<div class="feedback good">No mistakes this round.</div>`}</section>`;
      toast("Progress saved");
      Bridge.send("SHOW_TOAST", {message:"Cambridge progress saved"});
    }
    function speak(text){
      if(!("speechSynthesis" in window)) return toast("Listening is not available here");
      speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "fr-FR";
      utter.rate = .88;
      speechSynthesis.speak(utter);
    }

    function openSheet(title, html){
      $("sheetTitle").textContent = title;
      $("sheetBody").innerHTML = html;
      $("sheetLayer").classList.add("on");
    }
    function closeSheet(){ $("sheetLayer").classList.remove("on"); }
    function openAddProfile(){
      openSheet("Add child", `<div class="grid"><input id="newProfileName" placeholder="Child name"><button class="btn" id="saveNewProfile">Add profile</button></div>`);
      $("saveNewProfile").onclick = () => {
        const name = $("newProfileName").value.trim();
        if(!name) return toast("Add a name");
        const id = name.toLowerCase().replace(/[^a-z0-9]+/g,"_") || uid("child");
        state.profiles.push({id,name,avatar:name[0].toUpperCase(),color:"#22c8b8",stageBySubject:{english:1,math:1,science:1,french:1}});
        state.activeProfileId = id;
        save(); closeSheet(); renderAll();
      };
    }
    function openEditProfile(profileId){
      const item = state.profiles.find((entry) => entry.id === profileId);
      if(!item) return;
      openSheet("Edit child", `<div class="grid"><input id="profileName" value="${esc(item.name)}"><button class="btn" id="saveProfile">Save</button></div>`);
      $("saveProfile").onclick = () => {item.name = $("profileName").value.trim() || item.name; item.avatar = item.name[0].toUpperCase(); LearningBackendAdapter.saveProfile(item); closeSheet(); renderAll();};
    }
    function openEditor(){
      const opts = lessons().map((item) => `<option value="${item.lessonId}">${item.subject} S${item.stage} - ${esc(item.title)}</option>`).join("");
      openSheet("Lesson editor", `<div class="grid"><select id="editorLesson">${opts}</select><textarea id="editorJson" class="editor"></textarea><button class="btn" id="saveLessonJson">Save override</button></div>`);
      const load = () => { $("editorJson").value = JSON.stringify(lessonById($("editorLesson").value), null, 2); };
      $("editorLesson").onchange = load;
      $("saveLessonJson").onclick = () => {
        try{
          const data = JSON.parse($("editorJson").value);
          if(!data.lessonId || !Array.isArray(data.exercises)) throw new Error("Lesson requires lessonId and exercises.");
          LearningBackendAdapter.saveContentOverride(data.lessonId, data);
          closeSheet(); renderAll(); toast("Lesson override saved");
        } catch(error){ toast(error.message); }
      };
      load();
    }
    function openExport(){
      openSheet("Export snapshot", `<div class="grid"><textarea class="editor" readonly>${esc(LearningBackendAdapter.exportSnapshot())}</textarea><button class="btn secondary" id="copyExport">Copy</button></div>`);
      $("copyExport").onclick = async () => { try{ await navigator.clipboard.writeText(LearningBackendAdapter.exportSnapshot()); toast("Copied"); } catch { toast("Select and copy the text"); } };
    }
    function openImport(){
      openSheet("Import snapshot", `<div class="grid"><textarea id="importJson" class="editor" placeholder="Paste exported JSON"></textarea><button class="btn" id="doImport">Import</button></div>`);
      $("doImport").onclick = () => { try{ LearningBackendAdapter.importSnapshot($("importJson").value); closeSheet(); renderAll(); toast("Imported"); } catch(error){ toast(error.message); } };
    }
    function openReset(){
      openSheet("Reset local data?", `<div class="grid"><p class="muted">This clears local Cambridge progress, profiles and overrides on this device only.</p><button class="btn danger" id="confirmReset">Reset</button></div>`);
      $("confirmReset").onclick = () => { localStorage.removeItem(STORE_KEY); state = mergeStore(defaultStore()); closeSheet(); renderAll(); toast("Reset complete"); };
    }
    function toast(message){
      $("toast").textContent = message;
      $("toast").classList.add("on");
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => $("toast").classList.remove("on"), 2200);
    }
    function shuffle(array){
      const out = array.slice();
      for(let i = out.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); [out[i], out[j]] = [out[j], out[i]]; }
      return out;
    }

    init();
  </script>
</body>
</html>
