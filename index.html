$("#meAv").onclick=()=>switchTab("me");

/* ---------------- LOGIN + SPLASH ----------------
   No roster leak: show only the LAST signed-in user (welcome back card),
   or a manual username/email field. All accounts stay private. */
const userSlug=name=>String(name||"user").trim().toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"").slice(0,32)||"user";
const LastUser={KEY:"kinetik_last_user",
  get(){try{return JSON.parse(localStorage.getItem(this.KEY))}catch(e){return null}},
  save(u){localStorage.setItem(this.KEY,JSON.stringify({id:u.id}));},
  clear(){localStorage.removeItem(this.KEY);}
};
function finishLogin(user){
  S.userId=user.id;S.personId=user.personId;
  S.circleId=Perm.allowedCircleIds(user.id)[0];
  LastUser.save(user);
  Session.save();EventBus.emit("auth:login");
  $("#login").classList.add("hide");enterShell();
}
function tryLogin(u){
  const pin=$("#pinFld").value.trim();
  const savedPin=String(u.pin??"").trim();
  if(savedPin&&pin!==savedPin)return Toast.show("Wrong PIN");
  finishLogin(u);
}
function showSignup(list){
  $("#pinFld").value="";
  $("#pinFld").placeholder="Choose PIN (4-6 digits)";
  $("#loginBtn").textContent="Create account";
  $("#loginBtn").disabled=false;
  list.innerHTML=`
    <p style="font-size:13.5px;color:var(--faint);line-height:1.45;margin:0">${DB.d.users.length?"Create your personal account. You become the Leader of your first circle.":"No accounts exist yet. Create the first account and circle."}</p>
    <input class="fld" id="suName" placeholder="Your name" autocomplete="name">
    <input class="fld" id="suEmail" type="email" placeholder="Email (optional)" autocomplete="email">
    <input class="fld" id="suCircle" placeholder="First circle name" value="My Family">
    ${DB.d.users.length?'<button id="suBack" style="font-size:12.5px;font-weight:600;color:var(--acc);padding:2px 0;width:100%;text-align:center">‹ Back to sign in</button>':""}`;
  const sb=$("#suBack");if(sb)sb.onclick=()=>showManualLogin(list);
  $("#loginBtn").onclick=async()=>{
    const name=$("#suName").value.trim();
    const email=$("#suEmail").value.trim();
    const circleName=$("#suCircle").value.trim()||"My Family";
    const pin=$("#pinFld").value.trim();
    if(!name)return Toast.show("Add your name first");
    if(!/^\d{4,6}$/.test(pin))return Toast.show("PIN must be 4-6 digits");
    $("#loginBtn").disabled=true;$("#loginBtn").textContent="Creating...";
    try{
      const now=new Date().toISOString();
      const color="#6366f1";
      const person=await DataAPI.createLive("people",{id:uid("person"),displayName:name,avatar:name[0].toUpperCase(),color,createdAt:now,updatedAt:now,active:true});
      const user=await DataAPI.createLive("users",{id:uid("user"),username:userSlug(name),displayName:name,email,passwordDemo:pin,avatar:name[0].toUpperCase(),defaultPersonId:person.id,createdAt:now,updatedAt:now,active:true});
      const circle=await DataAPI.createLive("circles",{id:uid("circle"),name:circleName,type:"family",ownerUserId:user.id,icon:"family",color,description:"",createdAt:now,updatedAt:now,active:true});
      await DataAPI.createLive("circleMembers",{id:uid("member"),circleId:circle.id,personId:person.id,userId:user.id,role:"owner",permission:"full_control",joinedAt:now,active:true});
      const liveUser={...user,personId:person.id,pin};
      Toast.show("Account created");
      finishLogin(liveUser);
    }catch(e){
      console.error(e);Toast.show("Signup failed — check Apps Script access");
      $("#loginBtn").disabled=false;$("#loginBtn").textContent="Create account";
    }
  };
  Motion.reveal("#login .panel");
}
function showLogin(){
  $("#login").classList.remove("hide");
  const list=$("#personaList");list.innerHTML="";
  if(!DB.d.users.length){showSignup(list);return;}
  const last=LastUser.get();
  const lastUser=last&&DB.d.users.find(u=>u.id===last.id);
  if(lastUser)showWelcomeBack(list,lastUser);else showManualLogin(list);
  Motion.reveal("#login .panel");
}
function showWelcomeBack(list,u){
  $("#pinFld").value="";$("#pinFld").placeholder="PIN";
  $("#loginBtn").textContent="Continue";$("#loginBtn").disabled=false;
  const cids=Perm.allowedCircleIds(u.id);
  list.innerHTML=`<div class="persona on" style="pointer-events:none">
    <span class="av" style="background:${personColor(u.personId)||"#6366f1"}">${esc(u.displayName[0])}</span>
    <span><b>${esc(u.displayName)}</b><span>Welcome back · ${cids.length} circle${cids.length!==1?"s":""}</span></span></div>
    <button id="switchAcc" style="font-size:12.5px;font-weight:600;color:var(--acc);padding:2px 0;width:100%;text-align:center">Use a different account</button>`;
  $("#switchAcc").onclick=()=>showManualLogin(list);
  $("#loginBtn").onclick=()=>tryLogin(u);
  setTimeout(()=>$("#pinFld").focus(),120);
}
function showManualLogin(list){
  $("#pinFld").value="";$("#pinFld").placeholder="PIN";
  $("#loginBtn").textContent="Continue";$("#loginBtn").disabled=false;
  list.innerHTML=`<input class="fld" id="unameFld" placeholder="Username or email" autocomplete="username" autocapitalize="none">
    <button id="newAcc" style="font-size:12.5px;font-weight:600;color:var(--acc);padding:2px 0;width:100%;text-align:center">New here? Create an account</button>`;
  $("#newAcc").onclick=()=>showSignup(list);
  $("#loginBtn").onclick=()=>{
    const q=$("#unameFld").value.trim().toLowerCase();
    if(!q)return Toast.show("Type your username or email");
    const u=DB.d.users.find(u2=>[u2.username,u2.email,u2.displayName].some(v=>String(v||"").toLowerCase()===q));
    if(!u)return Toast.show("No account found — ask your circle Leader");
    tryLogin(u);
  };
  setTimeout(()=>$("#unameFld").focus(),120);
}
function enterShell(){
  $("#shell").classList.remove("hide");
  Theme.apply();switchTab("today");
  Motion.stagger("#topbar, #nav");
}
/* self-heal: legacy data wrote CircleMembers/Users rows whose People record
   was never created (pre-fix invite bug / hand-edited sheet). Recreate the
   missing People rows from the user account and relink — synced back live. */
function repairMembers(){
  const COLORS=["#6366f1","#0ea5e9","#10b981","#f59e0b","#ec4899","#8b5cf6"];
  (DB.d.circleMembers||[]).forEach((mem,i)=>{
    if(mem.personId&&DataAPI.get("people",mem.personId))return;
    const u=mem.userId&&DataAPI.get("users",mem.userId);
    if(!u)return;
    const pid=mem.personId||u.personId||uid("person");
    if(!DataAPI.get("people",pid)){
      DataAPI.create("people",{id:pid,displayName:u.displayName,avatar:String(u.displayName||"?")[0].toUpperCase(),color:COLORS[i%COLORS.length],createdByUserId:u.id,active:true});
    }
    let dirty=false;
    if(mem.personId!==pid){mem.personId=pid;dirty=true;}
    if(!mem.role){mem.role="member";dirty=true;}
    if(!mem.permission){mem.permission=ROLE_PERM[mem.role]||"edit_own";dirty=true;}
    if(dirty){DB.save();SyncEngine.queue("circleMembers","update",mem);}
    if(u.personId!==pid){u.personId=pid;DB.save();SyncEngine.queue("users","update",u);}
  });
}
async function boot(){
  await DB.load();await AppRegistry.load();repairMembers();Theme.apply();Scene.init();AppHost.init();
  const has=Session.restore();
  /* splash preview line */
  if(has){
    const ag=Cal.agendaToday(S.circleId);
    const nx=ag.find(a=>mins(a.end)>new Date().getHours()*60+new Date().getMinutes());
    $("#splashPv").textContent=circle().name+" · "+ag.length+" today"+(nx?" · next: "+nx.title+" "+fmtT(nx.start):"");
  }else $("#splashPv").textContent=DB.error?"Live Sheets unavailable":"Private circles for family & friends";
  /* splash: sunrise mark rises, letters cascade in, rings ripple */
  $("#splashLogo").innerHTML=[..."KINETIK"].map(ch=>`<span class="ch">${ch}</span>`).join("");
  if(Motion.ok()){
    gsap.timeline()
      .fromTo("#splash .srise svg",{y:50,opacity:0,scale:.4,transformOrigin:"50% 100%"},{y:0,opacity:1,scale:1,duration:.85,ease:"back.out(2)"})
      .fromTo("#splash .logo .ch",{y:30,opacity:0,filter:"blur(7px)"},{y:0,opacity:1,filter:"blur(0px)",duration:.5,stagger:.055,ease:"power3.out"},"-=.4")
      .fromTo("#splash .tag",{opacity:0,letterSpacing:".7em"},{opacity:1,letterSpacing:".34em",duration:.6,ease:"power2.out"},"-=.25")
      .fromTo("#splash .pv",{opacity:0,y:12},{opacity:1,y:0,duration:.4,ease:"power2.out"},"-=.3");
  }
  setTimeout(()=>{
    const sp=$("#splash");
    const done=()=>{if(sp.style.display==="none")return;sp.style.display="none";has?enterShell():showLogin();};
    if(Motion.ok())gsap.to(sp,{opacity:0,scale:1.07,duration:.5,ease:"power2.in",onComplete:done});
    /* rAF (and GSAP) throttles in background tabs — never let the splash hang */
    setTimeout(done,650);
  },has?1750:1950);
  /* refresh listeners */
  ["calendar:eventCreated","calendar:routineCreated","circle:changed","app:installed"].forEach(e=>EventBus.on(e,()=>{if(S.tab==="today")renderToday();}));
  EventBus.on("circle:changed",()=>{MomentsState.loadedCircle=null;if(S.tab==="moments")renderMoments();});
  $$("#nav button").forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));
  addEventListener("resize",movePill);
  matchMedia("(prefers-color-scheme: light)").addEventListener("change",()=>Theme.apply());
  if(location.protocol.startsWith("http")){
    try{const l=document.createElement("link");l.rel="manifest";l.href="manifest_kinetik.webmanifest";document.head.appendChild(l);}catch(e){}
    if("serviceWorker"in navigator){try{navigator.serviceWorker.register("PWA_SW.js")}catch(e){}}
  }
}
boot();
