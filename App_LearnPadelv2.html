<!--
KINETIK APP STANDARD v0.3

PRODUCT:
Kinetik is a private life app for Family and Friends circles.

APP:
Padel Coach is a polished learning-path app for the Kinetik rebuild.
Analog inspiration: Duolingo learning path, Nike Training Club, Playtomic.

IMPORTANT:
- This app uses proven Duolingo-style learning mechanics: path, XP, streaks, hearts, bite-size questions, instant feedback, and unit completion.
- It does not copy Duolingo brand assets, mascots, names, illustrations, or exact trade dress.
- It keeps a distinct Kinetik visual system.

ARCHITECTURE:
- Single self-contained HTML file.
- Inline CSS and vanilla JavaScript only.
- No external frameworks, CDNs, build step, or backend dependency.
- Works directly from a local HTML file.
- Works embedded inside the Kinetik shell iframe.
- Uses AppBridge messages for future parent-shell persistence.
- Uses localStorage for direct-file progress and history.

KINETIK INTEGRATION:
- Detects embedded mode with window.self !== window.top.
- Listens for INIT_APP messages.
- Accepts circleId, circleType, memberId, personId, theme, and context.
- Sends DATA_CREATE, DATA_UPDATE, and SHOW_TOAST bridge messages when relevant.

DATA:
- Storage prefix: kinetik_path_learn_padel.
- App-specific future records should be stored in AppRecords with circleId, appId, collection, and payloadJson.
- This app must not access another circle's data.

React/TypeScript app scale-up note:
- This single-file app should later become a React feature module or standalone route.
- It must keep using AppBridge/DataAPI contracts.
- It must not access another circle's data.
- It must store app-specific data in AppRecords using circleId, appId, collection, payloadJson.
-->

  <script>
    (function(){
      "use strict";
      const App={"file":"App_LearnPadel.html","appId":"learn-padel","name":"Padel Coach","shortName":"Padel","icon":"PC","gradient":["#10b981","#14b8a6"],"category":"sports","tagline":"Bite-size padel lessons for match-ready habits.","about":"A Kinetik learning-path coach for padel technique, tactics, and confident match reps.","audience":"padel players and families practicing together","circleTypes":["family","friends","learning"],"analog":"Duolingo learning path, Nike Training Club, Playtomic","units":[{"title":"Glass Defense","subtitle":"Read rebounds and reset rallies.","lessons":[{"title":"Let It Drop","kind":"Concept","questions":[{"prompt":"A fast ball hits the back glass. What is the calm first move?","choices":["Rush forward","Let it drop","Swing harder","Turn away"],"answer":1,"explain":"Letting the rebound drop gives you time and control."},{"prompt":"Where should your racket start during glass defense?","choices":["Huge backswing","Low and compact","Behind your head","On the floor"],"answer":1,"explain":"A compact racket path keeps the return clean."},{"prompt":"After a defensive return, where should you recover?","choices":["Into the fence","Middle baseline space","Outside court","At the net always"],"answer":1,"explain":"Recovering toward the middle helps cover the next shot."}]},{"title":"Soft Reset","kind":"Drill","questions":[{"prompt":"Your pair is under pressure. Best target?","choices":["Deep middle","Tiny angle","Opponent body hard","Random lob"],"answer":0,"explain":"Deep middle buys time and reduces angles."},{"prompt":"What hand feel helps a reset?","choices":["Tense wrist","Soft hands","Locked elbow","Full power"],"answer":1,"explain":"Soft hands absorb speed and guide the ball."},{"prompt":"A reset should mainly create...","choices":["More panic","Time","A fault","A trick shot"],"answer":1,"explain":"The reset is about earning time to recover."}]},{"title":"Lob Choice","kind":"Tactic","questions":[{"prompt":"A good defensive lob should be...","choices":["Low and flat","High and deep","At your partner","Into the side wall"],"answer":1,"explain":"Height and depth push opponents away from the net."},{"prompt":"When is a lob risky?","choices":["When balanced","When contact is late","When opponents are deep","When you have time"],"answer":1,"explain":"Late contact makes the lob short and attackable."},{"prompt":"Best follow-up after a deep lob?","choices":["Watch only","Move forward together","Stand still","Switch rackets"],"answer":1,"explain":"Both players can move forward when the lob creates space."}]}]},{"title":"Net Control","subtitle":"Win space with simple choices.","lessons":[{"title":"First Volley","kind":"Technique","questions":[{"prompt":"The first volley should usually be...","choices":["Short and wild","Deep and controlled","A smash","A drop every time"],"answer":1,"explain":"A deep first volley protects net position."},{"prompt":"Volley wrist should feel...","choices":["Quiet","Loose and floppy","Late","Huge"],"answer":0,"explain":"A quiet wrist keeps the face stable."},{"prompt":"Best body position at net?","choices":["Flat feet","Ready split step","Back turned","Sitting low"],"answer":1,"explain":"A split step prepares you for either direction."}]},{"title":"Bandeja Shape","kind":"Technique","questions":[{"prompt":"The bandeja is mainly used to...","choices":["Finish every point","Keep net position","Serve","Call score"],"answer":1,"explain":"A bandeja controls the lob and protects net space."},{"prompt":"Contact should be...","choices":["High and in front","Behind your body","Below the knee","With two hands"],"answer":0,"explain":"High contact lets you guide the ball with shape."},{"prompt":"The ideal finish is...","choices":["Across and controlled","Throw racket","Stop instantly","Spin around"],"answer":0,"explain":"A controlled finish keeps balance for recovery."}]}]}]};
      const Config={appId:App.appId,storagePrefix:"kinetik_path_learn_padel",collection:"learning_path_sessions"};
      const $=(s)=>document.querySelector(s);const $$=(s)=>Array.from(document.querySelectorAll(s));
      const fallback={theme:"light",circleId:"standalone_demo",circleType:(App.circleTypes&&App.circleTypes[0])||"learning",personId:"standalone_person",memberId:"standalone_person",screen:"path",activeUnit:0,activeLesson:0,q:0,selected:null,checked:false,lessonCorrect:0,xp:0,streak:0,hearts:5,completed:{},lastDate:""};
      const state=Object.assign(fallback,readJson(Config.storagePrefix+"_state",{}));state.embedded=isEmbedded();setTheme(state.theme,false);listen();wire();render();
      function isEmbedded(){try{return window.self!==window.top}catch(e){return true}}

      function listen(){window.addEventListener("message",(event)=>{const msg=event.data||{};if(msg.type!=="INIT_APP")return;const p=msg.payload||{};state.circleId=p.circleId||state.circleId;state.circleType=p.circleType||state.circleType;state.personId=p.personId||p.memberId||state.personId;state.memberId=p.memberId||p.personId||state.memberId;if(p.theme)setTheme(p.theme,true);save();render()})}
      function wire(){$("#homeBtn").onclick=()=>show("path");$("#secondaryBtn").onclick=()=>state.screen==="progress"?show("path"):show("progress");$("#primaryBtn").onclick=primary}
      function render(){renderHud();renderScreens();renderPath();renderLesson();renderResult();renderProgressScreen();renderBottom()}
      function renderHud(){const lesson=currentLesson();const pct=state.screen==="lesson"?Math.round((state.q/(lesson.questions.length))*100):completionPercent();$("#topProgress").style.width=pct+"%";$("#heartCount").textContent=state.hearts;$("#streakCount").textContent=state.streak;$("#xpCount").textContent=state.xp;$("#circleLabel").textContent=(state.embedded?"":"Standalone ")+titleCase(state.circleType)+" circle"}
      function renderScreens(){$$(".screen").forEach(s=>s.classList.remove("active"));$("#screen"+titleCase(state.screen)).classList.add("active")}
      function renderPath(){let html='<article class="hero"><div class="kicker">Kinetik Learning Path</div><h2>'+esc(App.tagline)+'</h2><p>'+esc(App.analog)+'</p></article><div class="path">';App.units.forEach((unit,ui)=>{html+='<section class="unit"><div class="unit-head"><b>'+esc(unit.title)+'</b><span>'+esc(unit.subtitle)+'</span></div><div class="node-wrap">';unit.lessons.forEach((lesson,li)=>{const key=lessonKey(ui,li);const locked=!isUnlocked(ui,li);const done=!!state.completed[key];html+='<button class="lesson '+(locked?'locked ':'')+(done?'done':'')+'" data-unit="'+ui+'" data-lesson="'+li+'" '+(locked?'disabled':'')+'><span class="badge">'+(done?'OK':locked?'L':li+1)+'</span><span><b>'+esc(lesson.title)+'</b><span>'+esc(lesson.kind)+' / '+lesson.questions.length+' questions</span></span><span class="state">'+(done?'Done':locked?'Locked':'Start')+'</span></button>'});html+='</div></section>'});html+='</div>';$("#screenPath").innerHTML=html;$$(".lesson:not(.locked)").forEach(btn=>btn.onclick=()=>startLesson(Number(btn.dataset.unit),Number(btn.dataset.lesson)))}

      function renderResult(){const lesson=currentLesson();$("#screenResult").innerHTML='<article class="card result"><div class="big">'+(state.lessonCorrect===lesson.questions.length?'XP':'OK')+'</div><h2>Lesson complete</h2><p>'+state.lessonCorrect+' of '+lesson.questions.length+' correct. You earned '+(10+state.lessonCorrect*5)+' XP for '+esc(lesson.title)+'.</p></article>'}
      function renderProgressScreen(){$("#screenProgress").innerHTML='<article class="hero"><div class="kicker">Progress</div><h2>'+completionPercent()+'% complete</h2><p>Your XP, hearts, streak, and completed nodes are saved locally for this circle.</p></article><div class="progress-grid" style="margin-top:14px"><div class="metric"><b>'+state.xp+'</b><span>Total XP</span></div><div class="metric"><b>'+state.streak+'</b><span>Streak</span></div><div class="metric"><b>'+Object.keys(state.completed).length+'</b><span>Lessons done</span></div><div class="metric"><b>'+state.hearts+'</b><span>Hearts</span></div></div>'}
      function renderBottom(){if(state.screen==="path"){$("#primaryBtn").textContent="Continue";$("#primaryBtn").disabled=false;$("#secondaryBtn").textContent="Stats"}else if(state.screen==="lesson"){$("#primaryBtn").textContent=state.checked?"Continue":"Check";$("#primaryBtn").disabled=state.selected==null;$("#secondaryBtn").textContent="Exit"}else if(state.screen==="result"){$("#primaryBtn").textContent="Back to path";$("#primaryBtn").disabled=false;$("#secondaryBtn").textContent="Stats"}else{$("#primaryBtn").textContent="Continue learning";$("#primaryBtn").disabled=false;$("#secondaryBtn").textContent="Path"}}
      function primary(){if(state.screen==="path"){const next=nextOpenLesson();startLesson(next.u,next.l);return}if(state.screen==="progress"){show("path");return}if(state.screen==="result"){show("path");return}if(state.screen==="lesson"){if(!state.checked)return checkAnswer();advanceQuestion()}}
      function checkAnswer(){const q=currentLesson().questions[state.q];state.checked=true;if(state.selected===q.answer){state.lessonCorrect+=1;toast("Correct")}else{state.hearts=Math.max(0,state.hearts-1);toast("Heart lost")}save();render()}
      function advanceQuestion(){const lesson=currentLesson();if(state.q<lesson.questions.length-1){state.q+=1;state.selected=null;state.checked=false;save();render();return}completeLesson()}
      function completeLesson(){const lesson=currentLesson();const key=lessonKey(state.activeUnit,state.activeLesson);const earned=10+state.lessonCorrect*5;state.completed[key]=true;state.xp+=earned;state.hearts=Math.min(5,state.hearts+1);const today=new Date().toISOString().slice(0,10);if(state.lastDate!==today){state.streak+=1;state.lastDate=today}Bridge.send("DATA_CREATE",{collection:Config.collection,payload:{circleId:state.circleId,circleType:state.circleType,appId:Config.appId,ownerPersonId:state.personId,lesson:lesson.title,unit:App.units[state.activeUnit].title,correct:state.lessonCorrect,total:lesson.questions.length,xp:earned,createdAt:new Date().toISOString()}});show("result")}
      function startLesson(u,l){state.activeUnit=u;state.activeLesson=l;state.q=0;state.selected=null;state.checked=false;state.lessonCorrect=0;show("lesson")}
      function show(screen){state.screen=screen;save();render()}
      function currentLesson(){return App.units[state.activeUnit].lessons[state.activeLesson]}
      function lessonKey(u,l){return "u"+u+"_l"+l}
      function isUnlocked(u,l){if(u===0&&l===0)return true;if(l>0)return !!state.completed[lessonKey(u,l-1)];const prev=App.units[u-1];return !!state.completed[lessonKey(u-1,prev.lessons.length-1)]}
      function nextOpenLesson(){for(let u=0;u<App.units.length;u++){for(let l=0;l<App.units[u].lessons.length;l++){if(isUnlocked(u,l)&&!state.completed[lessonKey(u,l)])return{u,l}}}return{u:0,l:0}}
      function completionPercent(){let total=0,done=0;App.units.forEach((unit,u)=>unit.lessons.forEach((lesson,l)=>{total++;if(state.completed[lessonKey(u,l)])done++}));return Math.round(done/Math.max(1,total)*100)}
      function visual(){return '<svg viewBox="0 0 240 136" aria-hidden="true"><defs><linearGradient id="g" x1="0" x2="1"><stop offset="0" stop-color="var(--a)"/><stop offset="1" stop-color="var(--b)"/></linearGradient></defs><path d="M48 94c26-56 118-70 148 0" fill="none" stroke="url(#g)" stroke-width="12" stroke-linecap="round" opacity=".28"/><circle cx="74" cy="76" r="30" fill="url(#g)" opacity=".88"/><rect x="116" y="48" width="72" height="14" rx="7" fill="url(#g)" opacity=".9"/><rect x="116" y="72" width="52" height="14" rx="7" fill="url(#g)" opacity=".55"/><rect x="116" y="96" width="84" height="14" rx="7" fill="url(#g)" opacity=".32"/></svg>'}
      function setTheme(theme,persist){state.theme=theme==="dark"?"dark":"light";document.documentElement.dataset.theme=state.theme;document.querySelector("meta[name='theme-color']").setAttribute("content",state.theme==="dark"?"#07110d":"#f7fff8");if(persist)save()}
      function save(){localStorage.setItem(Config.storagePrefix+"_state",JSON.stringify(state))}
      function readJson(key,fallback){try{const value=localStorage.getItem(key);return value?JSON.parse(value):fallback}catch(e){return fallback}}
      function toast(message){const node=$("#toast");node.textContent=message;node.classList.add("show");clearTimeout(toast.timer);toast.timer=setTimeout(()=>node.classList.remove("show"),1500)}
      function titleCase(v){v=String(v||"");return v.charAt(0).toUpperCase()+v.slice(1)}
      function esc(v){return String(v==null?"":v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}
    })();
  </script>
</body>
